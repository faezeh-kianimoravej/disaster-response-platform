version: "3.9"

services:
  # ---------------------------------------------------
  # Database
  # ---------------------------------------------------
  postgres:
    image: postgres:15
    container_name: disaster-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend-app/init-scripts:/docker-entrypoint-initdb.d
    networks:
      - disaster-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------
  # Kafka + Zookeeper (used only by notification-service)
  # ---------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: disaster-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - disaster-net
    restart: always

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: disaster-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - disaster-net
    restart: always
    healthcheck:
      test: ["CMD", "bash", "-c", "nc -z localhost 9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ---------------------------------------------------
  # Discovery Service (Eureka)
  # ---------------------------------------------------
  discovery-service:
    image: fkiani/disaster-response-discovery-service:latest
    container_name: discovery-service
    ports:
      - "8761:8761"
    networks:
      - disaster-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  # ---------------------------------------------------
  # API Gateway
  # ---------------------------------------------------
  api-gateway:
    image: fkiani/disaster-response-api-gateway:latest
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
    depends_on:
      discovery-service:
        condition: service_started
    networks:
      - disaster-net
    restart: always

  # ---------------------------------------------------
  # Backend Microservices (except location)
  # ---------------------------------------------------
  user-service:
    image: fkiani/disaster-response-user-service:latest
    container_name: user-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/user_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
    depends_on:
      - discovery-service
      - postgres
    networks:
      - disaster-net
    restart: always

  incident-service:
    image: fkiani/disaster-response-incident-service:latest
    container_name: incident-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/incident_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
    depends_on:
      - discovery-service
      - postgres
    networks:
      - disaster-net
    restart: always

  resource-service:
    image: fkiani/disaster-response-resource-service:latest
    container_name: resource-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/resource_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
    depends_on:
      - discovery-service
      - postgres
    networks:
      - disaster-net
    restart: always

  department-service:
    image: fkiani/disaster-response-department-service:latest
    container_name: department-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/department_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
    depends_on:
      - discovery-service
      - postgres
    networks:
      - disaster-net
    restart: always

  municipality-service:
    image: fkiani/disaster-response-municipality-service:latest
    container_name: municipality-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/municipality_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
    depends_on:
      - discovery-service
      - postgres
    networks:
      - disaster-net
    restart: always

  region-service:
    image: fkiani/disaster-response-region-service:latest
    container_name: region-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/region_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
    depends_on:
      - discovery-service
      - postgres
    networks:
      - disaster-net
    restart: always

  notification-service:
    image: fkiani/disaster-response-notification-service:latest
    container_name: notification-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/notification_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - discovery-service
      - postgres
      - kafka
    networks:
      - disaster-net
    restart: always

  # ---------------------------------------------------
  # Frontend
  # ---------------------------------------------------
  frontend:
    image: fkiani/disaster-response-frontend:latest
    container_name: disaster-frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - disaster-net
    restart: always

# ---------------------------------------------------
# Networks & Volumes
# ---------------------------------------------------
volumes:
  pgdata:

networks:
  disaster-net:
    driver: bridge
