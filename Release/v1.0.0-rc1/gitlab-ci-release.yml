# ==========================================================
# Disaster Response - Simplified Release Pipeline
# Builds & pushes all backend and frontend images to Docker Hub
# ==========================================================

stages:
  - release

release:
  stage: release
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    TAG: "${CI_COMMIT_TAG:-V1.0.0-rc1}"
  before_script:
    - echo "🔐 Logging in to Docker Hub..."
    - docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_TOKEN"
  script:
    - echo "🚀 Starting full release (TAG=$TAG)"

    # ================================
    # 🔹 Backend Services
    # ================================
    - cd backend-app
    - |
      declare -a services=(
        "discovery-service"
        "api-gateway"
        "user-service"
        "incident-service"
        "resource-service"
        "notification-service"
        "department-service"
        "municipality-service"
        "region-service"
      )

      for service in "${services[@]}"; do
        IMAGE="$DOCKERHUB_USERNAME/disaster-response-$service"
        echo "Building $IMAGE..."
        docker build -t "$IMAGE:$TAG" -f "$service/Dockerfile" "./$service"
        docker push "$IMAGE:$TAG"
        docker tag "$IMAGE:$TAG" "$IMAGE:latest"
        docker push "$IMAGE:latest"
        echo "Done: $service"
        echo "--------------------------------------"
      done

    - cd ..

    # ================================
    # 🌐 Frontend
    # ================================
    - echo "🌐 Building and pushing frontend..."
    - docker build -t "$DOCKERHUB_USERNAME/disaster-response-frontend:$TAG" -f client-app/Dockerfile client-app
    - docker push "$DOCKERHUB_USERNAME/disaster-response-frontend:$TAG"
    - docker tag "$DOCKERHUB_USERNAME/disaster-response-frontend:$TAG" "$DOCKERHUB_USERNAME/disaster-response-frontend:latest"
    - docker push "$DOCKERHUB_USERNAME/disaster-response-frontend:latest"

    - echo "All services built and pushed successfully!"
  rules:

    - if: '$CI_COMMIT_TAG'
      when: always
