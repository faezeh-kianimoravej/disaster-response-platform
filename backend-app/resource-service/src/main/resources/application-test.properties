# Test profile for resource-service using Testcontainers PostgreSQL
spring.cloud.discovery.enabled=false
spring.cloud.config.enabled=false

# Ensure JPA creates schema for tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Let Spring Boot auto-configure datasource via @ServiceConnection
# No explicit spring.datasource.* settings required

# Speed up tests
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

server.port=0
