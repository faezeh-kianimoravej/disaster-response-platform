# =======================================
# MUNICIPALITY SERVICE CONFIG
# =======================================

# ---------------------------------------
# Actuator
# ---------------------------------------
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info


# ---------------------------------------
# Server
# ---------------------------------------
server.address=0.0.0.0
spring.application.name=municipality-service
server.port=8082


# (database / JPA moved to profile-specific files: application-local-docker.properties and application-prod.properties)

# ---------------------------------------
# Feign
# ---------------------------------------
logging.level.org.springframework.cloud.openfeign=DEBUG
spring.cloud.openfeign.enabled=true


# ---------------------------------------
# Error handling
# ---------------------------------------
server.error.include-binding-errors=always
server.error.include-message=always
