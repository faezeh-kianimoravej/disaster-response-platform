# =======================================
# COMMON SETTINGS (shared across all environments)
# =======================================
# Bind to all interfaces for container compatibility
server.address=0.0.0.0
spring.application.name=municipality-service
server.port=8082
# ---- Database ----
spring.datasource.url=jdbc:postgresql://localhost:5432/municipality_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=1234
# ---- Hibernate / JPA ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
# ---- Feign Client (always enabled) ----
spring.cloud.openfeign.enabled=true
# Optional: control Feign log detail level (NONE, BASIC, HEADERS, FULL)
logging.level.org.springframework.cloud.openfeign=DEBUG
# ---- Common error handling ----
server.error.include-message=always
server.error.include-binding-errors=always
# ---- Default active profile ----
spring.profiles.active=prod
