# ============================================
# Application Configuration
# ============================================
spring.application.name=notification-service
server.port=8085
# ============================================
# Eureka Client Configuration
# ============================================
eureka.client.service-url.defaultZone=http://discovery-service:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
# ============================================
# Kafka Configuration
# ============================================
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.consumer.group-id=notification-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.type.mapping=incidentEvent:nl.saxion.disaster.notificationservice.event.IncidentEvent
# ============================================
# Database Configuration (PostgreSQL)
# ============================================
spring.datasource.url=jdbc:postgresql://postgres-db:5432/notification_db
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver
# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# ============================================
# Feign Client (optional, defaults are fine)
# ============================================
#spring.cloud.openfeign.circuitbreaker.enabled=true
#spring.cloud.openfeign.client.config.default.connect-timeout=5000
#spring.cloud.openfeign.client.config.default.read-timeout=10000
#spring.cloud.openfeign.client.config.default.logger-level=full
# ============================================
# Logging Configuration
# ============================================
logging.level.root=INFO
logging.level.org.springframework.cloud.openfeign=DEBUG
logging.level.org.springframework.kafka=INFO
logging.level.nl.saxion.disaster.notificationservice=DEBUG
