# Backend App CI/CD Pipeline Configuration

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"

# Cache configuration for faster builds
.backend-app-cache: &backend-app-cache
  cache:
    key:
      files:
        - backend-app/pom.xml
    paths:
      - .m2/repository/

# Base job template for backend-app jobs
.backend-app-base:
  image: maven:3.9-eclipse-temurin-21
  <<: *backend-app-cache
  before_script:
    - cd backend-app

# Unit test job (runs on branches/MRs, not on main/tags)
test:backend-app:
  extends: .backend-app-base
  stage: test
  rules:
    # Skip on tags and main (integration job will run all tests there)
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-rc\d+)?$/'
      when: never
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: never
    # Run on branches/MRs
    - when: on_success
  script:
    - echo "[VERSIONS] Maven version:" && mvn --version | head -3
    - echo "[VERSIONS] Java version:" && java -version
    - mvn -B clean org.jacoco:jacoco-maven-plugin:0.8.10:prepare-agent test org.jacoco:jacoco-maven-plugin:0.8.10:report
    - |
      # Compute coverage percentage from JaCoCo xml (rounded integer) and generate badges
      set -e
      echo "[BADGE] Starting backend badge generation..."
      echo "[BADGE] Current directory: $(pwd)"
      JACOCO_XML=$(find . -path "*/target/site/jacoco/jacoco.xml" | head -n1 || true)
      echo "[BADGE] JaCoCo XML search result: ${JACOCO_XML:-NOT FOUND}"
      PCT=0
      if [ -f "$JACOCO_XML" ]; then
        echo "[BADGE] Found JaCoCo XML at: $JACOCO_XML"
        JACOCO_SIZE=$(du -h "$JACOCO_XML" | cut -f1)
        echo "[BADGE] JaCoCo XML size: $JACOCO_SIZE"
        LINE_MISSED=$(sed -n 's/.*type="LINE" missed="\([0-9]*\)".*/\1/p' "$JACOCO_XML") || LINE_MISSED=0
        LINE_COVERED=$(sed -n 's/.*type="LINE" missed="[0-9]*" covered="\([0-9]*\)".*/\1/p' "$JACOCO_XML") || LINE_COVERED=0
        echo "[BADGE] Extracted LINE_MISSED=$LINE_MISSED, LINE_COVERED=$LINE_COVERED"
        if [ -z "$LINE_MISSED" ] || [ -z "$LINE_COVERED" ]; then
          echo "[BADGE] WARNING: Could not parse LINE counters from $JACOCO_XML"
        else
          PCT=$(awk -v m="$LINE_MISSED" -v c="$LINE_COVERED" 'BEGIN{if((m+c)==0) printf "0"; else printf "%d", c/(m+c)*100}')
          echo "[BADGE] Calculated coverage: ${PCT}%"
          echo "Total Coverage: ${PCT}%"
        fi
      else
        echo "[BADGE] ERROR: JaCoCo XML not found; skipping coverage summary"
      fi
      # Generate badges directory
      echo "[BADGE] Creating badges directory..."
      mkdir -p badges || true
      echo "[BADGE] Badges directory exists: $(test -d badges && echo 'YES' || echo 'NO')"
      # Coverage badge color logic: green >=90, yellow >=75, orange >=60, red otherwise
      cov=${PCT:-0}
      if [ "$cov" -ge 90 ]; then
        covColor="#4c1"
      elif [ "$cov" -ge 75 ]; then
        covColor="#dfb317"
      elif [ "$cov" -ge 60 ]; then
        covColor="#f39c12"
      else
        covColor="#e05d44"
      fi
      covSvg="<?xml version=\"1.0\"?>\n<svg xmlns='http://www.w3.org/2000/svg' width='110' height='20'>\n  <rect width='110' height='20' fill='#555'/>\n  <rect x='60' width='50' height='20' fill='${covColor}'/>\n  <g fill='#fff' font-family='Verdana,Geneva,sans-serif' font-size='11'>\n    <text x='8' y='14'>coverage</text>\n    <text x='72' y='14'>${cov}%</text>\n  </g>\n</svg>"
      echo -e "$covSvg" > badges/coverage.svg || echo "Failed to write badges/coverage.svg"
      # Find surefire XML files produced by modules and sum tests attributes
      echo "[BADGE] Searching for surefire reports..."
      TEST_FILES=$(find . -path "./*/target/surefire-reports/TEST-*.xml" -print || true)
      TEST_FILE_COUNT=$(echo "$TEST_FILES" | grep -c . || echo 0)
      echo "[BADGE] Found $TEST_FILE_COUNT surefire XML files"
      if [ -z "$TEST_FILES" ]; then
        echo "[BADGE] WARNING: No surefire TEST-*.xml files found; writing zero tests badge"
        TEST_COUNT=0
      else
        echo "[BADGE] Surefire files:"
        echo "$TEST_FILES" | head -10
        TEST_COUNT=$(grep -ho 'tests="[0-9]*"' $TEST_FILES 2>/dev/null | sed 's/tests="\([0-9]*\)"/\1/' | awk '{s+=$1}END{print s+0}')
        TEST_COUNT=${TEST_COUNT:-0}
        echo "[BADGE] Extracted test count: $TEST_COUNT"
      fi
      testSvg="<?xml version=\"1.0\"?>\n<svg xmlns='http://www.w3.org/2000/svg' width='110' height='20'>\n  <rect width='110' height='20' fill='#555'/>\n  <rect x='60' width='50' height='20' fill='#007ec6'/>\n  <g fill='#fff' font-family='Verdana,Geneva,sans-serif' font-size='11'>\n    <text x='8' y='14'>tests</text>\n    <text x='72' y='14'>${TEST_COUNT}</text>\n  </g>\n</svg>"
      echo -e "$testSvg" > badges/tests.svg && echo "[BADGE] ✓ Wrote badges/tests.svg" || echo "[BADGE] ✗ Failed to write badges/tests.svg"
      echo "[BADGE] Badge generation summary -> tests=${TEST_COUNT} cov=${cov}%"
      echo "[BADGE] Verifying badge files:"
      test -f badges/tests.svg && echo "[BADGE] ✓ badges/tests.svg exists ($(du -h badges/tests.svg | cut -f1))" || echo "[BADGE] ✗ badges/tests.svg NOT FOUND"
      test -f badges/coverage.svg && echo "[BADGE] ✓ badges/coverage.svg exists ($(du -h badges/coverage.svg | cut -f1))" || echo "[BADGE] ✗ badges/coverage.svg NOT FOUND"
      echo "[PRE-ARTIFACT] Listing badges/ directory:"
      ls -lah badges/ || echo "badges/ directory not found"
      echo "[PRE-ARTIFACT] Listing target/site/jacoco/ directories:"
      find . -path "*/target/site/jacoco" -type d -exec sh -c 'echo "Found: {}" && ls -lh "{}"/*.xml 2>/dev/null | head -5' \;
      echo "[PRE-ARTIFACT] Listing surefire-reports/ directories:"
      find . -path "*/target/surefire-reports" -type d -exec sh -c 'echo "Found: {}" && ls -lh "{}" | head -10' \;
  artifacts:
    when: always
    reports:
      junit:
        - backend-app/*/target/surefire-reports/TEST-*.xml
    paths:
      - backend-app/*/target/site/jacoco/jacoco.xml
      - backend-app/*/target/surefire-reports/TEST-*.xml
      - backend-app/badges/*.svg
    expire_in: 30 days
  coverage: '/Total Coverage: ([0-9]{1,3})%/'

# Integration test job (runs unit + integration tests on main/tags)
integration:backend-app:
  extends: .backend-app-base
  image: docker:26.1.4-cli
  stage: test
  rules:
    # Run on tags and main only
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-rc\d+)?$/'
      when: always
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: always
    - when: never
  services:
    - name: docker:24.0.9-dind
      command: ["--tls=false"]
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
    DOCKER_DRIVER: overlay2
    # Testcontainers environment variables for Docker-in-Docker
    TESTCONTAINERS_RYUK_DISABLED: "true"
    TESTCONTAINERS_HOST_OVERRIDE: docker
    TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: tcp://docker:2375
    TESTCONTAINERS_DOCKER_CLIENT_STRATEGY: org.testcontainers.dockerclient.EnvironmentAndSystemPropertyClientProviderStrategy
    TESTCONTAINERS_EXPERIMENTAL_DOCKER_CLIENT_ENABLED: "true"
    JAVA_TOOL_OPTIONS: "-Ddocker.host=tcp://docker:2375 -Dtestcontainers.dockerclient.strategy=org.testcontainers.dockerclient.EnvironmentAndSystemPropertyClientProviderStrategy"
  before_script:
    - |
      if ! command -v java >/dev/null 2>&1 || ! command -v mvn >/dev/null 2>&1; then
        echo "[SETUP] Installing OpenJDK 21 + Maven"
        apk add --no-cache openjdk21-jdk maven >/dev/null
      fi
    - cd backend-app
    - export DOCKER_HOST="${DOCKER_HOST:-tcp://docker:2375}"
    - export DOCKER_TLS_VERIFY=""
    - export DOCKER_CERT_PATH=""
    - export TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE="$DOCKER_HOST"
    - export TESTCONTAINERS_HOST_OVERRIDE="${TESTCONTAINERS_HOST_OVERRIDE:-docker}"
    - |
      cat <<'EOF' > ~/.testcontainers.properties
      docker.host=tcp://docker:2375
      docker.client.strategy=org.testcontainers.dockerclient.EnvironmentAndSystemPropertyClientProviderStrategy
      EOF
    - echo "[ENV] Docker/Testcontainers configuration"
    - env | grep -E 'DOCKER|TESTCONTAINERS' | sort
    # Install Docker CLI for Testcontainers without relying on OS package mirrors
    - |
      if ! command -v docker >/dev/null 2>&1; then
        echo "[DOCKER] docker CLI not found; downloading static binary..."
        DOWNLOAD_URL="https://download.docker.com/linux/static/stable/x86_64/docker-24.0.9.tgz"
        TMP_TAR="/tmp/docker.tgz"
        if command -v curl >/dev/null 2>&1; then
          curl -fsSL "$DOWNLOAD_URL" -o "$TMP_TAR"
        else
          echo "[DOCKER] curl not available, installing it via apt..."
          apt-get update -qq && apt-get install -y -qq curl
          curl -fsSL "$DOWNLOAD_URL" -o "$TMP_TAR"
        fi
        tar -xzf "$TMP_TAR" -C /tmp docker/docker
        install -m 755 /tmp/docker/docker /usr/local/bin/docker
        rm -rf /tmp/docker "$TMP_TAR"
      fi
    # Verify Docker connectivity to DinD service
    - echo "Waiting for Docker daemon at $DOCKER_HOST..."
    - for i in {1..30}; do docker -H $DOCKER_HOST version && break || ([ $i -lt 30 ] && sleep 2); done
    - echo "Docker connection verified"
    - docker -H $DOCKER_HOST ps
  script:
    - echo "[VERSIONS] Maven version:" && mvn --version | head -3
    - echo "[VERSIONS] Java version:" && java -version
    - echo "[INTEGRATION] Running unit + integration tests with coverage"
    - mvn -B clean -P integration-tests org.jacoco:jacoco-maven-plugin:0.8.10:prepare-agent verify org.jacoco:jacoco-maven-plugin:0.8.10:report
    - |
      # Compute coverage percentage from JaCoCo xml (rounded integer) and generate badges
      set -e
      echo "[BADGE] Starting backend badge generation (integration job)..."
      echo "[BADGE] Current directory: $(pwd)"
      JACOCO_XML=$(find . -path "*/target/site/jacoco/jacoco.xml" | head -n1 || true)
      echo "[BADGE] JaCoCo XML search result: ${JACOCO_XML:-NOT FOUND}"
      PCT=0
      if [ -f "$JACOCO_XML" ]; then
        echo "[BADGE] Found JaCoCo XML at: $JACOCO_XML"
        JACOCO_SIZE=$(du -h "$JACOCO_XML" | cut -f1)
        echo "[BADGE] JaCoCo XML size: $JACOCO_SIZE"
        LINE_MISSED=$(sed -n 's/.*type="LINE" missed="\([0-9]*\)".*/\1/p' "$JACOCO_XML") || LINE_MISSED=0
        LINE_COVERED=$(sed -n 's/.*type="LINE" missed="[0-9]*" covered="\([0-9]*\)".*/\1/p' "$JACOCO_XML") || LINE_COVERED=0
        echo "[BADGE] Extracted LINE_MISSED=$LINE_MISSED, LINE_COVERED=$LINE_COVERED"
        if [ -z "$LINE_MISSED" ] || [ -z "$LINE_COVERED" ]; then
          echo "[BADGE] WARNING: Could not parse LINE counters from $JACOCO_XML"
        else
          PCT=$(awk -v m="$LINE_MISSED" -v c="$LINE_COVERED" 'BEGIN{if((m+c)==0) printf "0"; else printf "%d", c/(m+c)*100}')
          echo "[BADGE] Calculated coverage: ${PCT}%"
          echo "Total Coverage: ${PCT}%"
        fi
      else
        echo "[BADGE] ERROR: JaCoCo XML not found; skipping coverage summary"
      fi
      echo "[BADGE] Creating badges directory..."
      mkdir -p badges || true
      echo "[BADGE] Badges directory exists: $(test -d badges && echo 'YES' || echo 'NO')"
      cov=${PCT:-0}
      if [ "$cov" -ge 90 ]; then
        covColor="#4c1"
      elif [ "$cov" -ge 75 ]; then
        covColor="#dfb317"
      elif [ "$cov" -ge 60 ]; then
        covColor="#f39c12"
      else
        covColor="#e05d44"
      fi
      covSvg="<?xml version=\"1.0\"?>\n<svg xmlns='http://www.w3.org/2000/svg' width='110' height='20'>\n  <rect width='110' height='20' fill='#555'/>\n  <rect x='60' width='50' height='20' fill='${covColor}'/>\n  <g fill='#fff' font-family='Verdana,Geneva,sans-serif' font-size='11'>\n    <text x='8' y='14'>coverage</text>\n    <text x='72' y='14'>${cov}%</text>\n  </g>\n</svg>"
      echo -e "$covSvg" > badges/coverage.svg || echo "Failed to write badges/coverage.svg"
      echo "[BADGE] Searching for surefire reports..."
      TEST_FILES=$(find . -path "./*/target/surefire-reports/TEST-*.xml" -print || true)
      TEST_FILE_COUNT=$(echo "$TEST_FILES" | grep -c . || echo 0)
      echo "[BADGE] Found $TEST_FILE_COUNT surefire XML files"
      if [ -z "$TEST_FILES" ]; then
        echo "[BADGE] WARNING: No surefire TEST-*.xml files found; writing zero tests badge"
        TEST_COUNT=0
      else
        echo "[BADGE] Surefire files:"
        echo "$TEST_FILES" | head -10
        TEST_COUNT=$(grep -ho 'tests="[0-9]*"' $TEST_FILES 2>/dev/null | sed 's/tests="\([0-9]*\)"/\1/' | awk '{s+=$1}END{print s+0}')
        TEST_COUNT=${TEST_COUNT:-0}
        echo "[BADGE] Extracted test count: $TEST_COUNT"
      fi
      testSvg="<?xml version=\"1.0\"?>\n<svg xmlns='http://www.w3.org/2000/svg' width='110' height='20'>\n  <rect width='110' height='20' fill='#555'/>\n  <rect x='60' width='50' height='20' fill='#007ec6'/>\n  <g fill='#fff' font-family='Verdana,Geneva,sans-serif' font-size='11'>\n    <text x='8' y='14'>tests</text>\n    <text x='72' y='14'>${TEST_COUNT}</text>\n  </g>\n</svg>"
      echo -e "$testSvg" > badges/tests.svg && echo "[BADGE] ✓ Wrote badges/tests.svg" || echo "[BADGE] ✗ Failed to write badges/tests.svg"
      echo "[BADGE] Badge generation summary -> tests=${TEST_COUNT} cov=${cov}%"
      echo "[BADGE] Verifying badge files:"
      test -f badges/tests.svg && echo "[BADGE] ✓ badges/tests.svg exists ($(du -h badges/tests.svg | cut -f1))" || echo "[BADGE] ✗ badges/tests.svg NOT FOUND"
      test -f badges/coverage.svg && echo "[BADGE] ✓ badges/coverage.svg exists ($(du -h badges/coverage.svg | cut -f1))" || echo "[BADGE] ✗ badges/coverage.svg NOT FOUND"
      echo "[PRE-ARTIFACT] Listing badges/ directory:"
      ls -lah badges/ || echo "badges/ directory not found"
      echo "[PRE-ARTIFACT] Listing target/site/jacoco/ directories:"
      find . -path "*/target/site/jacoco" -type d -exec sh -c 'echo "Found: {}" && ls -lh "{}"/*.xml 2>/dev/null | head -5' \;
      echo "[PRE-ARTIFACT] Listing surefire-reports/ directories:"
      find . -path "*/target/surefire-reports" -type d -exec sh -c 'echo "Found: {}" && ls -lh "{}" | head -10' \;
  artifacts:
    when: always
    reports:
      junit:
        - backend-app/*/target/surefire-reports/TEST-*.xml
        - backend-app/*/target/failsafe-reports/TEST-*.xml
    paths:
      - backend-app/*/target/surefire-reports/TEST-*.xml
      - backend-app/*/target/failsafe-reports/TEST-*.xml
      - backend-app/*/target/site/jacoco/jacoco.xml
      - backend-app/badges/*.svg
    expire_in: 30 days
  coverage: '/Total Coverage: ([0-9]{1,3})%/'

# Post coverage job: convert JaCoCo XML to a minimal Cobertura XML, publish as artifact, and post MR note
post-coverage:backend:
  image: alpine:latest
  stage: test
  needs:
    - job: test:backend-app
      artifacts: true
      optional: true
    - job: integration:backend-app
      artifacts: true
      optional: true
  rules:
    - if: '$CI_MERGE_REQUEST_IID'
      when: on_success
    - when: never
  script:
    - |
      # Find jacoco.xml produced by the test job
      # Prefer integration coverage when available (main/tags), otherwise fall back to unit coverage
      JACOCO_XML=$(find backend-app -path "*/target/site/jacoco/jacoco.xml" | sort | head -n1 || true)
      if [ -z "$JACOCO_XML" ] || [ ! -f "$JACOCO_XML" ]; then
        echo "Jacoco XML not found; skipping Cobertura artifact creation"
        exit 0
      fi
      echo "Found jacoco xml: $JACOCO_XML"
      # Install python (available in Alpine) and run the repo's converter
      apk add --no-cache python3 py3-pip >/dev/null 2>&1 || true
      python3 -V || true
      mkdir -p backend-app/coverage
      # Convert JaCoCo XML to Cobertura XML using the in-repo script
      if python3 backend-app/tools/jacoco_to_cobertura.py -i "$JACOCO_XML" -o backend-app/coverage/cobertura-coverage.xml 2>/dev/null; then
        echo "Converted jacoco.xml to backend-app/coverage/cobertura-coverage.xml"
      else
        echo "Conversion failed; falling back to minimal cobertura"
        # Fallback: compute simple project-level line-rate and write minimal cobertura
        LINE_MISSED=$(sed -n 's/.*type="LINE" missed="\([0-9]*\)".*/\1/p' "$JACOCO_XML")
        LINE_COVERED=$(sed -n 's/.*type="LINE" missed="[0-9]*" covered="\([0-9]*\)".*/\1/p' "$JACOCO_XML")
        TOTAL=$((LINE_MISSED+LINE_COVERED))
        if [ "$TOTAL" -eq 0 ]; then
          LINE_RATE=0
        else
          LINE_RATE_FLOAT=$(awk -v m="$LINE_MISSED" -v c="$LINE_COVERED" 'BEGIN{printf "%.4f", c/(m+c)}')
          LINE_RATE="$LINE_RATE_FLOAT"
        fi
        TIMESTAMP=$(date +%s)
        # Write a minimal Cobertura XML using printf to avoid heredoc indentation issues
        printf '%s\n' "<?xml version=\"1.0\"?>" "<!DOCTYPE coverage SYSTEM \"http://cobertura.sourceforge.net/xml/coverage-04.dtd\">" "<coverage line-rate=\"${LINE_RATE}\" branch-rate=\"0\" version=\"0.1\" timestamp=\"${TIMESTAMP}\">" "  <packages/>" "</coverage>" > backend-app/coverage/cobertura-coverage.xml
        echo "Wrote fallback backend-app/coverage/cobertura-coverage.xml"
      fi
      # Read line-rate from Cobertura for reporting
      LINE_RATE=$(sed -n 's/.*line-rate="\([0-9.]*\)".*/\1/p' backend-app/coverage/cobertura-coverage.xml || echo 0)
      PERCENT=$(awk -v lr="$LINE_RATE" 'BEGIN{printf "%.2f", lr*100}')
      echo "Backend coverage (reported): ${PERCENT}%"
      # Post MR comment if token present
      if [ -z "$GITLAB_API_TOKEN" ]; then
        echo "GITLAB_API_TOKEN not set; skipping MR comment"
        exit 0
      fi
      ARTIFACT_URL="$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_REF_NAME/raw/backend-app/coverage/cobertura-coverage.xml?job=test:backend-app"
      echo "Native coverage artifact created at backend-app/coverage/cobertura-coverage.xml"
      echo "Merge Request comment posting disabled; GitLab native coverage will display in the MR and pipeline." 
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: backend-app/coverage/cobertura-coverage.xml
    paths:
      - backend-app/coverage/
    expire_in: 7 days
