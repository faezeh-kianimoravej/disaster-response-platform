# Backend App CI/CD Pipeline Configuration

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"

# Cache configuration for faster builds
.backend-app-cache: &backend-app-cache
  cache:
    key:
      files:
        - backend-app/pom.xml
    paths:
      - .m2/repository/

# Base job template for backend-app jobs
.backend-app-base:
  image: maven:3.9-eclipse-temurin-21
  <<: *backend-app-cache
  before_script:
    - cd backend-app

# Test job
test:backend-app:
  extends: .backend-app-base
  stage: test
  rules:
    # Always run on version tags
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-rc\d+)?$/'
      when: always
    # Run tests only when backend-app files change
    - changes:
        - backend-app/**/*
      when: always
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: always
    - when: never
  script:
    - mvn -B clean org.jacoco:jacoco-maven-plugin:0.8.10:prepare-agent test org.jacoco:jacoco-maven-plugin:0.8.10:report
    - |
      # Find generated JaCoCo XML and compute line coverage percent (rounded)
      JACOCO_XML=$(find . -path "*/target/site/jacoco/jacoco.xml" | head -n1 || true)
      if [ -f "$JACOCO_XML" ]; then
        LINE_MISSED=$(sed -n 's/.*type="LINE" missed="\([0-9]*\)".*/\1/p' "$JACOCO_XML")
        LINE_COVERED=$(sed -n 's/.*type="LINE" missed="[0-9]*" covered="\([0-9]*\)".*/\1/p' "$JACOCO_XML")
        if [ -z "$LINE_MISSED" ] || [ -z "$LINE_COVERED" ]; then
          echo "Could not parse LINE counters from $JACOCO_XML"
        else
          PCT=$(awk -v m="$LINE_MISSED" -v c="$LINE_COVERED" 'BEGIN{if((m+c)==0) printf "0"; else printf "%d", c/(m+c)*100}')
          echo "Total Coverage: ${PCT}%"
        fi
      else
        echo "Jacoco XML not found; skipping coverage summary"
      fi
  artifacts:
    when: always
    reports:
      junit:
        - backend-app/*/target/surefire-reports/TEST-*.xml
    paths:
      - backend-app/*/target/surefire-reports/
      - backend-app/*/target/site/jacoco/
    expire_in: 30 days
  coverage: '/Total Coverage: ([0-9]{1,3})%/'

# Post coverage job: convert JaCoCo XML to a minimal Cobertura XML, publish as artifact, and post MR note
post-coverage:backend:
  image: alpine:latest
  stage: test
  needs:
    - job: test:backend-app
      artifacts: true
  rules:
    - if: '$CI_MERGE_REQUEST_IID'
      when: on_success
    - when: never
  script:
    - |
      # Find jacoco.xml produced by the test job
      JACOCO_XML=$(find . -path "*/target/site/jacoco/jacoco.xml" | head -n1 || true)
      if [ -z "$JACOCO_XML" ] || [ ! -f "$JACOCO_XML" ]; then
        echo "Jacoco XML not found; skipping Cobertura artifact creation"
        exit 0
      fi
      echo "Found jacoco xml: $JACOCO_XML"
      # Install python (available in Alpine) and run the repo's converter
      apk add --no-cache python3 py3-pip >/dev/null 2>&1 || true
      python3 -V || true
      mkdir -p backend-app/coverage
      # Convert JaCoCo XML to Cobertura XML using the in-repo script
      if python3 backend-app/tools/jacoco_to_cobertura.py -i "$JACOCO_XML" -o backend-app/coverage/cobertura-coverage.xml 2>/dev/null; then
        echo "Converted jacoco.xml to backend-app/coverage/cobertura-coverage.xml"
      else
        echo "Conversion failed; falling back to minimal cobertura"
        # Fallback: compute simple project-level line-rate and write minimal cobertura
        LINE_MISSED=$(sed -n 's/.*type="LINE" missed="\([0-9]*\)".*/\1/p' "$JACOCO_XML")
        LINE_COVERED=$(sed -n 's/.*type="LINE" missed="[0-9]*" covered="\([0-9]*\)".*/\1/p' "$JACOCO_XML")
        TOTAL=$((LINE_MISSED+LINE_COVERED))
        if [ "$TOTAL" -eq 0 ]; then
          LINE_RATE=0
        else
          LINE_RATE_FLOAT=$(awk -v m="$LINE_MISSED" -v c="$LINE_COVERED" 'BEGIN{printf "%.4f", c/(m+c)}')
          LINE_RATE="$LINE_RATE_FLOAT"
        fi
        TIMESTAMP=$(date +%s)
        # Write a minimal Cobertura XML using printf to avoid heredoc indentation issues
        printf '%s\n' "<?xml version=\"1.0\"?>" "<!DOCTYPE coverage SYSTEM \"http://cobertura.sourceforge.net/xml/coverage-04.dtd\">" "<coverage line-rate=\"${LINE_RATE}\" branch-rate=\"0\" version=\"0.1\" timestamp=\"${TIMESTAMP}\">" "  <packages/>" "</coverage>" > backend-app/coverage/cobertura-coverage.xml
        echo "Wrote fallback backend-app/coverage/cobertura-coverage.xml"
      fi
      # Read line-rate from Cobertura for reporting
      LINE_RATE=$(sed -n 's/.*line-rate="\([0-9.]*\)".*/\1/p' backend-app/coverage/cobertura-coverage.xml || echo 0)
      PERCENT=$(awk -v lr="$LINE_RATE" 'BEGIN{printf "%.2f", lr*100}')
      echo "Backend coverage (reported): ${PERCENT}%"
      # Post MR comment if token present
      if [ -z "$GITLAB_API_TOKEN" ]; then
        echo "GITLAB_API_TOKEN not set; skipping MR comment"
        exit 0
      fi
      ARTIFACT_URL="$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_REF_NAME/raw/backend-app/coverage/cobertura-coverage.xml?job=test:backend-app"
      echo "Native coverage artifact created at backend-app/coverage/cobertura-coverage.xml"
      echo "Merge Request comment posting disabled; GitLab native coverage will display in the MR and pipeline." 
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: backend-app/coverage/cobertura-coverage.xml
    paths:
      - backend-app/coverage/
    expire_in: 7 days
