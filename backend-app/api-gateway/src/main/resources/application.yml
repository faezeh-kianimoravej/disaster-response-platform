

server:
  port: 8080

spring:
  application:
    name: api-gateway

  main:
    web-application-type: reactive

  profiles:
    active: local-docker

  cloud:
    gateway:

      discovery:
        locator:
          enabled: false

      httpclient:
        connect-timeout: 5000
        response-timeout: 30000ms

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: ["*"]
            allowedMethods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
            allowedHeaders: ["*"]
            allowCredentials: false

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

      routes:

        # SSE ROUTES
        - id: incident-notification-sse
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/incidents/stream/**
          filters:
            - SetResponseHeader=Cache-Control, no-store
            - RemoveResponseHeader=Transfer-Encoding
            - RemoveResponseHeader=Content-Length

        - id: deployment-notification-sse
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/deployment/stream/**
          filters:
            - SetResponseHeader=Content-Type, text/event-stream
            - SetResponseHeader=Cache-Control, no-store
            - RemoveResponseHeader=Transfer-Encoding
            - RemoveResponseHeader=Content-Length

        - id: chat-sse
          uri: lb://chat-service
          predicates:
            - Path=/api/chat/*/subscribe
          filters:
            - SetResponseHeader=Content-Type, text/event-stream
            - SetResponseHeader=Cache-Control, no-store
            - RemoveResponseHeader=Transfer-Encoding
            - RemoveResponseHeader=Content-Length

        # NORMAL ROUTES (GET with CircuitBreaker)
        - id: region
          uri: lb://region-service
          predicates:
            - Path=/api/regions/**
          filters:
            - name: CircuitBreaker
              args:
                name: regionCB
                fallbackUri: forward:/fallback

        - id: department
          uri: lb://department-service
          predicates:
            - Path=/api/departments/**
          filters:
            - name: CircuitBreaker
              args:
                name: departmentCB
                fallbackUri: forward:/fallback

        - id: resource
          uri: lb://resource-service
          predicates:
            - Path=/api/resources/**
          filters:
            - name: CircuitBreaker
              args:
                name: resourceCB
                fallbackUri: forward:/fallback

        - id: municipality
          uri: lb://municipality-service
          predicates:
            - Path=/api/municipalities/**
          filters:
            - name: CircuitBreaker
              args:
                name: municipalityCB
                fallbackUri: forward:/fallback

        - id: incident
          uri: lb://incident-service
          predicates:
            - Path=/api/incidents/**
          filters:
            - name: CircuitBreaker
              args:
                name: incidentCB
                fallbackUri: forward:/fallback

        - id: location
          uri: lb://location-service
          predicates:
            - Path=/api/locations/**
          filters:
            - name: CircuitBreaker
              args:
                name: locationCB
                fallbackUri: forward:/fallback

        # DEPLOYMENT SERVICE ROUTES (POST/PUT/DELETE without CircuitBreaker)
        - id: deployment-order
          uri: lb://deployment-service
          predicates:
            - Path=/api/deployment-orders/**

        - id: response-unit
          uri: lb://deployment-service
          predicates:
            - Path=/api/response-units/**

        - id: deployment-request
          uri: lb://deployment-service
          predicates:
            - Path=/api/deployment-requests/**

        - id: deployment
          uri: lb://deployment-service
          predicates:
            - Path=/api/deployment/**

        # CHAT
        - id: chat
          uri: lb://chat-service
          predicates:
            - Path=/api/chat/**
          filters:
            - name: CircuitBreaker
              args:
                name: chatCB
                fallbackUri: forward:/fallback

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty.http.client: INFO
