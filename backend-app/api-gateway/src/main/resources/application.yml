server:
  port: 8080

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      # Discovery Locator: Enable dynamic routing by service name
      # This allows routing to any registered service via /{service-name}/**
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      
      # Default filters applied to all routes
        profiles:
          active: local-docker
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
      
      # Global CORS configuration
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "*"
            allowedMethods:
              - "GET"
              - "POST"
              - "PUT"
              - "DELETE"
              - "PATCH"
              - "OPTIONS"
            allowedHeaders:
              - "*"
            allowCredentials: false
            maxAge: 3600
      
      # Explicit routes with path rewrites for clean API surface
      routes:
        # Region service: /api/regions/** (all other endpoints) -> region-service/api/regions/**
        - id: region
          uri: lb://region-service
          predicates:
            - Path=/api/regions/**
          filters:
            - name: CircuitBreaker
              args:
                name: regionServiceCircuitBreaker
                fallbackUri: forward:/fallback

        # Department service: /api/departments/** -> department-service/api/departments/**
        - id: department-departments
          uri: lb://department-service
          predicates:
            - Path=/api/departments/**
          filters:
            - name: CircuitBreaker
              args:
                name: departmentServiceCircuitBreaker
                fallbackUri: forward:/fallback
        
        # Department service: /api/resources/** -> department-service/api/resources/**
        - id: department-resources
          uri: lb://department-service
          predicates:
            - Path=/api/resources/**
          filters:
            - name: CircuitBreaker
              args:
                name: resourceServiceCircuitBreaker
                fallbackUri: forward:/fallback

        # Municipality service: /api/municipalities/** -> municipality-service/api/municipalities/**
        - id: municipality
          uri: lb://municipality-service
          predicates:
            - Path=/api/municipalities/**
          filters:
            - name: CircuitBreaker
              args:
                name: municipalityServiceCircuitBreaker
                fallbackUri: forward:/fallback

        # Incident service: /api/incidents/** -> incident-service/api/incidents/**
        - id: incident
          uri: lb://incident-service
          predicates:
            - Path=/api/incidents/**
          filters:
            - name: CircuitBreaker
              args:
                name: incidentServiceCircuitBreaker
                fallbackUri: forward:/fallback

        # Location service: /api/locations/** -> location-service/api/locations/**
        - id: location
          uri: lb://location-service
          predicates:
            - Path=/api/locations/**
          filters:
            - name: CircuitBreaker
              args:
                name: locationServiceCircuitBreaker
                fallbackUri: forward:/fallback

        # Notification service SSE: /api/notifications/incidents/stream/** -> notification-service/api/notifications/incidents/stream/** (no circuit breaker)
        - id: notification-sse
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/incidents/stream/**
          filters:
            - SetResponseHeader=Cache-Control, no-store
            - RemoveResponseHeader=Transfer-Encoding
            
        # Notification service: /api/notifications/** -> notification-service/api/notifications/**
        - id: notification
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
          filters:
            - name: CircuitBreaker
              args:
                name: notificationServiceCircuitBreaker
                fallbackUri: forward:/fallback

eureka:
  client:
    serviceUrl:
      # Use discovery-service hostname for Docker, localhost for local dev
      # Override via environment variable: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    # Use hostname-based routing in Docker, IP-based locally
    # Override via environment variable: EUREKA_INSTANCE_PREFER_IP_ADDRESS
    prefer-ip-address: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS:true}
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

# Logging for debugging gateway routing
logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty.http.client: INFO

