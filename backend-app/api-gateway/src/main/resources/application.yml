server:
  port: 8080

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  profiles:
    active: local-docker

  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
          lower-case-service-id: true

        httpclient:
          connect-timeout: 5000
          response-timeout: 30000ms

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: ["*"]
            allowedMethods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
            allowedHeaders: ["*"]
            allowCredentials: false
            maxAge: 3600

      routes:

        # ---------------------------
        # SSE ROUTES — MUST COME FIRST
        # ---------------------------

        # Incident SSE
        - id: incident-notification-sse
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/incidents/stream/**
          filters:
            - SetResponseHeader=Cache-Control, no-store
            - RemoveResponseHeader=Transfer-Encoding
            - RemoveResponseHeader=Content-Length

        # Deployment SSE
        - id: deployment-notification-sse
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/deployment/stream/**
          filters:
            - SetResponseHeader=Content-Type, text/event-stream
            - SetResponseHeader=Cache-Control, no-store
            - RemoveResponseHeader=Transfer-Encoding
            - RemoveResponseHeader=Content-Length

        # Chat SSE
        - id: chat-sse
          uri: lb://chat-service
          predicates:
            - Path=/api/chat/*/subscribe
          filters:
            - SetResponseHeader=Content-Type, text/event-stream
            - SetResponseHeader=Cache-Control, no-store
            - RemoveResponseHeader=Transfer-Encoding
            - RemoveResponseHeader=Content-Length

        # ---------------------------
        # NORMAL SERVICES
        # ---------------------------

        - id: region
          uri: lb://region-service
          predicates:
            - Path=/api/regions/**
          filters:
            - name: CircuitBreaker
              args:
                name: regionServiceCircuitBreaker
                fallbackUri: forward:/fallback

        - id: department
          uri: lb://department-service
          predicates:
            - Path=/api/departments/**
          filters:
            - name: CircuitBreaker
              args:
                name: departmentServiceCircuitBreaker
                fallbackUri: forward:/fallback

        - id: resource
          uri: lb://resource-service
          predicates:
            - Path=/api/resources/**
          filters:
            - name: CircuitBreaker
              args:
                name: resourceServiceCircuitBreaker
                fallbackUri: forward:/fallback

        - id: municipality
          uri: lb://municipality-service
          predicates:
            - Path=/api/municipalities/**
          filters:
            - name: CircuitBreaker
              args:
                name: municipalityServiceCircuitBreaker
                fallbackUri: forward:/fallback

        - id: incident
          uri: lb://incident-service
          predicates:
            - Path=/api/incidents/**
          filters:
            - name: CircuitBreaker
              args:
                name: incidentServiceCircuitBreaker
                fallbackUri: forward:/fallback

        - id: location
          uri: lb://location-service
          predicates:
            - Path=/api/locations/**
          filters:
            - name: CircuitBreaker
              args:
                name: locationServiceCircuitBreaker
                fallbackUri: forward:/fallback

        # Normal Notifications (NON-SSE)
        - id: notification
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
          filters:
            - name: CircuitBreaker
              args:
                name: notificationServiceCircuitBreaker
                fallbackUri: forward:/fallback

        - id: user
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - name: CircuitBreaker
              args:
                name: userServiceCircuitBreaker
                fallbackUri: forward:/fallback

        - id: deployment-order
          uri: lb://deployment-service
          predicates:
            - Path=/api/deployment-orders/**
          filters:
            - name: CircuitBreaker
              args:
                name: deploymentServiceCircuitBreaker
                fallbackUri: forward:/fallback

        - id: response-unit
          uri: lb://deployment-service
          predicates:
            - Path=/api/response-units/**
          filters:
            - name: CircuitBreaker
              args:
                name: deploymentServiceCircuitBreaker
                fallbackUri: forward:/fallback

        - id: deployment-request
          uri: lb://deployment-service
          predicates:
            - Path=/api/deployment-requests/**
          filters:
            - name: CircuitBreaker
              args:
                name: deploymentServiceCircuitBreaker
                fallbackUri: forward:/fallback

        - id: deployment
          uri: lb://deployment-service
          predicates:
            - Path=/api/deployment/**
          filters:
            - name: CircuitBreaker
              args:
                name: deploymentServiceCircuitBreaker
                fallbackUri: forward:/fallback

        - id: chat
          uri: lb://chat-service
          predicates:
            - Path=/api/chat/**
          filters:
            - name: CircuitBreaker
              args:
                name: chatServiceCircuitBreaker
                fallbackUri: forward:/fallback



eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true

  instance:
    prefer-ip-address: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS:true}
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty.http.client: INFO
