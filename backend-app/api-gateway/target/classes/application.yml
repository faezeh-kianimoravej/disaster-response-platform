server:
  port: 8080

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# Routes mapping (documented here - controller implements the forwarding)
gateway:
  info: |
    /api/departments -> http://localhost:8081
    /api/incidents    -> http://localhost:8081
    /api/municipalities -> http://localhost:8082
    /api/locations -> http://localhost:8082
