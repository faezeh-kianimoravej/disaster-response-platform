# =======================================
# DEPLOYMENT SERVICE CONFIG (LOCAL DOCKER)
# =======================================
# ---------------------------------------
# Eureka
# ---------------------------------------
eureka.client.enabled=true
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=http://discovery-service:8761/eureka/
eureka.instance.hostname=deployment-service
spring.cloud.discovery.enabled=true
# ---------------------------------------
# Kafka (Producer)
# ---------------------------------------
spring.kafka.bootstrap-servers=kafka:9092
# ---------------------------------------
# Datasource (local-docker)
# ---------------------------------------
spring.datasource.url=jdbc:postgresql://postgres-db:5432/deployment_db
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver
# ---------------------------------------
# Hibernate / JPA
# ---------------------------------------
spring.jpa.defer-datasource-initialization=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
spring.sql.init.mode=always
# ---------------------------------------
# Server
# ---------------------------------------
server.address=0.0.0.0
spring.application.name=deployment-service
server.port=8088
