# =======================================
# LOCATION SERVICE CONFIG (PROD)
# =======================================


# ---------------------------------------
# Eureka
# ---------------------------------------
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=http://discovery-service.drccs.local:8761/eureka/
eureka.instance.hostname=location-service


# ---------------------------------------
# Kafka
# ---------------------------------------
spring.kafka.bootstrap-servers=kafka.drccs.local:9092


# ---------------------------------------
# Datasource
# ---------------------------------------
spring.datasource.url=jdbc:postgresql://drccs-db.cv24ewc6mmoj.eu-north-1.rds.amazonaws.com:5432/postgres
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


# ---------------------------------------
# Hibernate / JPA
# ---------------------------------------
spring.jpa.defer-datasource-initialization=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
