# ========================================
# ? H2 Database Configuration (Test Only)
# ========================================
spring.datasource.url=jdbc:h2:mem:department_testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ========================================
# ? JPA / Hibernate for Tests
# ========================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ========================================
# ? H2 Console (Disabled for Tests)
# ========================================
spring.h2.console.enabled=false

# ========================================
# ? Port Randomization (to avoid port conflicts)
# ========================================
server.port=0

# ========================================
# ? Disable DevTools reload (makes tests faster)
# ========================================
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false
