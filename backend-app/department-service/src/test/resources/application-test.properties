# ========================================
# PostgreSQL Configuration (For Tests)
# ========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/municipality_test_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=devpass
# ========================================
# JPA / Hibernate for Tests
# ========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# ========================================
# SQL Initialization
# ========================================
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false
# ========================================
# Disable DevTools reload (faster test startup)
# ========================================
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false
# ========================================
# Randomize Port to avoid conflicts
# ========================================
server.port=0
