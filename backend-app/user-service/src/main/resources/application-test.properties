# Test profile for user-service using Testcontainers PostgreSQL
spring.cloud.discovery.enabled=false
spring.cloud.config.enabled=false

# Disable Feign clients during tests
spring.cloud.openfeign.enabled=false

# Disable OAuth2 for tests to avoid 401 responses and initialization issues
spring.security.oauth2.resourceserver.jwt.issuer-uri=
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=

# Ensure JPA creates schema for tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Speed up tests
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

server.port=0
