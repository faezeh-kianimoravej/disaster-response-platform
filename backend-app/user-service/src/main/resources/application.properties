# =========================================================
# BASIC SERVICE CONFIGURATION
# =========================================================
spring.application.name=user-service
server.port=8086
# =========================================================
# DATABASE CONFIGURATION (PostgreSQL)
# =========================================================
spring.datasource.url=jdbc:postgresql://user-db:5432/user_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# =========================================================
# EUREKA DISCOVERY CLIENT
# =========================================================
eureka.client.service-url.defaultZone=http://discovery-service:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=user-service
# =========================================================
# SECURITY / KEYCLOAK (Resource Server)
# =========================================================
# URL to your Keycloak Realm (inside Docker network)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak:8080/realms/disaster-response
# Optional: if running locally without Docker
# spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/disaster-response
# =========================================================
# LOGGING
# =========================================================
logging.level.root=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.nl.saxion.disaster.userservice=DEBUG
logging.file.name=logs/user-service.log
# =========================================================
# PROFILES
# =========================================================
spring.profiles.active=prod
# =========================================================
# ACTUATOR (Optional - for monitoring)
# =========================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

