services:
  # ==============================
  # PostgreSQL Database (shared)
  # ==============================
  postgres-db:
    image: postgres:16
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - backend-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ==============================
  # Keycloak Identity Server
  # ==============================
  keycloak-db-restore:
    image: postgres:16
    depends_on:
      postgres-db:
        condition: service_healthy
    entrypoint: >
      bash -c "
        sleep 10;
        PGPASSWORD=1234 psql -h postgres-db -U postgres -d keycloak_db -f /docker-entrypoint-initdb.d/keycloak_db.sql
      "
    volumes:
      - ./keycloak/keycloak_db.sql:/docker-entrypoint-initdb.d/keycloak_db.sql
    networks:
      - backend-network
    restart: no

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak
    command: start-dev --http-port=9090
    environment:
      KEYCLOAK_ADMIN: disaster-admin
      KEYCLOAK_ADMIN_PASSWORD: AdminSecure123!
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-db:5432/keycloak_db
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: 1234
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "9090:9090"
    depends_on:
      postgres-db:
        condition: service_healthy
      keycloak-db-restore:
        condition: service_completed_successfully
    networks:
      - backend-network
    restart: always

  # ==============================
  # Zookeeper
  # ==============================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - backend-network

  # ==============================
  # Kafka Broker
  # ==============================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - backend-network
    restart: on-failure

  # ==============================
  # Eureka Discovery Service
  # ==============================
  discovery-service:
    image: eclipse-temurin:21-jre-alpine
    container_name: discovery-service
    ports:
      - "8761:8761"
    networks:
      - backend-network
    depends_on:
      postgres-db:
        condition: service_healthy
    volumes:
      - ./discovery-service/target/discovery-service-1.0.0-dev.jar:/app/app.jar:ro
    working_dir: /app
    entrypoint: [ "java", "-jar", "app.jar" ]
    restart: on-failure

  # ==============================
  # API Gateway
  # ==============================
  api-gateway:
    image: eclipse-temurin:21-jre-alpine
    container_name: api-gateway
    depends_on:
      discovery-service:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${STACK_PROFILE:-local-docker}
    networks:
      - backend-network
    volumes:
      - ./api-gateway/target/api-gateway-1.0.0-dev.jar:/app/app.jar:ro
    working_dir: /app
    entrypoint: [ "java", "-jar", "app.jar" ]
    restart: on-failure

  # ==============================
  # Resource Service
  # ==============================
  resource-service:
    image: eclipse-temurin:21-jre-alpine
    container_name: resource-service
    depends_on:
      postgres-db:
        condition: service_healthy
      discovery-service:
        condition: service_started
    ports:
      - "8087:8087"
    environment:
      SPRING_PROFILES_ACTIVE: ${STACK_PROFILE:-local-docker}
    networks:
      - backend-network
    volumes:
      - ./resource-service/target/resource-service-1.0.0-dev.jar:/app/app.jar:ro
    working_dir: /app
    entrypoint: [ "java", "-jar", "app.jar" ]
    restart: on-failure

  # ==============================
  # Department Service
  # ==============================
  department-service:
    image: eclipse-temurin:21-jre-alpine
    container_name: department-service
    depends_on:
      postgres-db:
        condition: service_healthy
      discovery-service:
        condition: service_started
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: ${STACK_PROFILE:-local-docker}
    networks:
      - backend-network
    volumes:
      - ./department-service/target/department-service-1.0.0-dev.jar:/app/app.jar:ro
    working_dir: /app
    entrypoint: [ "java", "-jar", "app.jar" ]
    restart: on-failure

  # ==============================
  # Municipality Service
  # ==============================
  municipality-service:
    image: eclipse-temurin:21-jre-alpine
    container_name: municipality-service
    depends_on:
      postgres-db:
        condition: service_healthy
      discovery-service:
        condition: service_started
      department-service:
        condition: service_started
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: ${STACK_PROFILE:-local-docker}
    networks:
      - backend-network
    volumes:
      - ./municipality-service/target/municipality-service-1.0.0-dev.jar:/app/app.jar:ro
    working_dir: /app
    entrypoint: [ "java", "-jar", "app.jar" ]
    restart: on-failure

  # ==============================
  # Region Service
  # ==============================
  region-service:
    image: eclipse-temurin:21-jre-alpine
    container_name: region-service
    depends_on:
      postgres-db:
        condition: service_healthy
      discovery-service:
        condition: service_started
      municipality-service:
        condition: service_started
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: ${STACK_PROFILE:-local-docker}
    networks:
      - backend-network
    volumes:
      - ./region-service/target/region-service-1.0.0-dev.jar:/app/app.jar:ro
    working_dir: /app
    entrypoint: [ "java", "-jar", "app.jar" ]
    restart: on-failure

  # ==============================
  # Incident Service
  # ==============================
  incident-service:
    image: eclipse-temurin:21-jre-alpine
    container_name: incident-service
    depends_on:
      postgres-db:
        condition: service_healthy
      discovery-service:
        condition: service_started
      kafka:
        condition: service_started
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: ${STACK_PROFILE:-local-docker}
    networks:
      - backend-network
    volumes:
      - ./incident-service/target/incident-service-1.0.0-dev.jar:/app/app.jar:ro
    working_dir: /app
    entrypoint: [ "java", "-jar", "app.jar" ]
    restart: on-failure

  # ==============================
  # Notification Service
  # ==============================
  notification-service:
    image: eclipse-temurin:21-jre-alpine
    container_name: notification-service
    depends_on:
      postgres-db:
        condition: service_healthy
      discovery-service:
        condition: service_started
      kafka:
        condition: service_started
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: ${STACK_PROFILE:-local-docker}
    networks:
      - backend-network
    volumes:
      - ./notification-service/target/notification-service-1.0.0-dev.jar:/app/app.jar:ro
    working_dir: /app
    entrypoint: [ "java", "-jar", "app.jar" ]
    restart: on-failure

  # ==============================
  # User Service (WITH Eureka)
  # ==============================
  user-service:
    image: eclipse-temurin:21-jre-alpine
    container_name: user-service
    depends_on:
      postgres-db:
        condition: service_healthy
      discovery-service:
        condition: service_started
      kafka:
        condition: service_started
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: ${STACK_PROFILE:-local-docker}
    networks:
      - backend-network
    volumes:
      - ./user-service/target/user-service-1.0.0-dev.jar:/app/app.jar:ro
    working_dir: /app
    entrypoint: [ "java", "-jar", "app.jar" ]
    restart: on-failure

  # ==============================
  # Deployment Service
  # ==============================
  deployment-service:
    image: eclipse-temurin:21-jre-alpine
    container_name: deployment-service
    depends_on:
      postgres-db:
        condition: service_healthy
      discovery-service:
        condition: service_started
      kafka:
        condition: service_started
    ports:
      - "8088:8088"
    environment:
      SPRING_PROFILES_ACTIVE: ${STACK_PROFILE:-local-docker}
    networks:
      - backend-network
    volumes:
      - ./deployment-service/target/deployment-service-1.0.0-dev.jar:/app/app.jar:ro
    working_dir: /app
    # ====== ONLY CHANGE ADDED ======
    entrypoint: [ "java", "-jar", "app.jar" ]
    # =================================
    restart: on-failure

  # ==============================
  # Chat Service
  # ==============================
  chat-service:
    image: eclipse-temurin:21-jre-alpine
    container_name: chat-service
    depends_on:
      postgres-db:
        condition: service_healthy
      discovery-service:
        condition: service_started
      user-service:
        condition: service_started
    ports:
      - "8089:8089"
    environment:
      SPRING_PROFILES_ACTIVE: ${STACK_PROFILE:-local-docker}
    networks:
      - backend-network
    volumes:
      - ./chat-service/target/chat-service-1.0.0-dev.jar:/app/app.jar:ro
    working_dir: /app
    entrypoint: [ "java", "-jar", "app.jar" ]
    restart: on-failure


# ==============================
# Network & Volumes
# ==============================
networks:
  backend-network:
    driver: bridge

volumes:
  postgres_data:


