version: '3.9'

services:
  # ==============================
  # PostgreSQL Database (shared)
  # ==============================
  postgres-db:
    image: postgres:16
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - backend-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ==============================
  # Zookeeper
  # ==============================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - backend-network

  # ==============================
  # Kafka Broker
  # ==============================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - backend-network
    restart: on-failure

  # ==============================
  # Eureka Discovery Service
  # ==============================
  discovery-service:
    build: ./discovery-service
    container_name: discovery-service
    ports:
      - "8761:8761"
    networks:
      - backend-network
    depends_on:
      postgres-db:
        condition: service_healthy
    restart: on-failure

  # ==============================
  # API Gateway
  # ==============================
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    depends_on:
      discovery-service:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${STACK_PROFILE:-local-docker}
    networks:
      - backend-network
    restart: on-failure

  # ==============================
  # Department Service
  # ==============================
  department-service:
    build: ./department-service
    container_name: department-service
    depends_on:
      postgres-db:
        condition: service_healthy
      discovery-service:
        condition: service_started
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: ${STACK_PROFILE:-local-docker}
    networks:
      - backend-network
    restart: on-failure

  # ==============================
  # Municipality Service
  # ==============================
  municipality-service:
    build: ./municipality-service
    container_name: municipality-service
    depends_on:
      postgres-db:
        condition: service_healthy
      discovery-service:
        condition: service_started
      department-service:
        condition: service_started
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: ${STACK_PROFILE:-local-docker}
    networks:
      - backend-network
    restart: on-failure

  # ==============================
  # Region Service
  # ==============================
  region-service:
    build: ./region-service
    container_name: region-service
    depends_on:
      postgres-db:
        condition: service_healthy
      discovery-service:
        condition: service_started
      municipality-service:
        condition: service_started
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: ${STACK_PROFILE:-local-docker}
    networks:
      - backend-network
    restart: on-failure

  # ==============================
  # Incident Service
  # ==============================
  incident-service:
    build: ./incident-service
    container_name: incident-service
    depends_on:
      postgres-db:
        condition: service_healthy
      discovery-service:
        condition: service_started
      kafka:
        condition: service_started
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: ${STACK_PROFILE:-local-docker}
    networks:
      - backend-network
    restart: on-failure

  # ==============================
  # Notification Service
  # ==============================
  notification-service:
    build: ./notification-service
    container_name: notification-service
    depends_on:
      postgres-db:
        condition: service_healthy
      discovery-service:
        condition: service_started
      kafka:
        condition: service_started
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: ${STACK_PROFILE:-local-docker}
    networks:
      - backend-network
    restart: on-failure

  # ==============================
  # User Service (WITH Eureka)
  # ==============================
  user-service:
    build: ./user-service
    container_name: user-service
    depends_on:
      postgres-db:
        condition: service_healthy
      discovery-service:
        condition: service_started
      kafka:
        condition: service_started
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: ${STACK_PROFILE:-local-docker}
    networks:
      - backend-network
    restart: on-failure

# ==============================
# Network & Volumes
# ==============================
networks:
  backend-network:
    driver: bridge

volumes:
  postgres_data:
