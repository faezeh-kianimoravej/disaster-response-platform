# =======================================
# REGION SERVICE CONFIG
# =======================================

# ---------------------------------------
# Actuator
# ---------------------------------------
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info


# ---------------------------------------
# Database
# ---------------------------------------
# (moved to profile-specific files: local-docker and prod)


# ---------------------------------------
# Error handling
# ---------------------------------------
server.error.include-binding-errors=always
server.error.include-message=always


# ---------------------------------------
# Feign
# ---------------------------------------
logging.level.org.springframework.cloud.openfeign=DEBUG
spring.cloud.openfeign.enabled=true


# ---------------------------------------
# Hibernate / JPA
# ---------------------------------------
spring.jpa.defer-datasource-initialization=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
spring.sql.init.mode=always


# ---------------------------------------
# Server
# ---------------------------------------
server.address=0.0.0.0
spring.application.name=region-service
server.port=8083

# ---------------------------------------
# Keycloak
# ---------------------------------------
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak:9090/realms/DRCCS
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://keycloak:9090/realms/DRCCS/protocol/openid-connect/certs
spring.security.oauth2.resourceserver.jwt.allowed-issuers=http://localhost:9090/realms/DRCCS