# =======================================
# COMMON SETTINGS
# =======================================
# Bind to all interfaces for container compatibility
server.address=0.0.0.0
spring.application.name=region-service
server.port=8083
# ---- Database ----
spring.datasource.url=jdbc:postgresql://postgres-db:5432/region_db
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver
# ---- Hibernate / JPA ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
# ---- Actuator ----
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
# ---- Feign (always enabled) ----
spring.cloud.openfeign.enabled=true
# Optional advanced Feign logging level (NONE, BASIC, HEADERS, FULL)
logging.level.org.springframework.cloud.openfeign=DEBUG
# ---- Error handling ----
server.error.include-message=always
server.error.include-binding-errors=always
# ---- Active profile ----
spring.profiles.active=prod
