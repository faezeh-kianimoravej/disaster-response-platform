# DRCCS GitLab CI/CD Pipeline
stages:
  - validate
  - test
  - build
  - image
  - scan
  - publish

variables:
  NODE_VERSION: "20"
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
  DOCKER_TLS_CERTDIR: "/certs"
  # Security scan exclusions
  SAST_EXCLUDED_PATHS: "**/node_modules,**/dist,**/build,**/.next,**/coverage,**/target"
  SECRET_DETECTION_EXCLUDED_PATHS: "**/node_modules,**/dist,**/build,**/.next,**/coverage,**/target"

include:
  - local: 'client-app/.gitlab-ci.yml'
  - local: 'backend-app/.gitlab-ci.yml'
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

# ======================================
# Version Validation (tags only)
# ======================================
validate:version:
  stage: validate
  image: alpine:latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-rc\d+)?$/'
      when: always
    - when: never
  script:
    - |
      VERSION_FILE=$(cat VERSION)
      EXPECTED_TAG="v$VERSION_FILE"
      echo "VERSION file contains: $VERSION_FILE"
      echo "Git tag is: $CI_COMMIT_TAG"
      if [ "$CI_COMMIT_TAG" != "$EXPECTED_TAG" ]; then
        echo "ERROR: Tag mismatch! Git tag '$CI_COMMIT_TAG' does not match VERSION file '$EXPECTED_TAG'"
        exit 1
      fi
      echo "✓ Version validation passed"
      echo "VERSION=$VERSION_FILE" >> variables.env
  artifacts:
    reports:
      dotenv: variables.env

# ======================================
# Backend Image Build Jobs
# ======================================
.backend-image-base:
  stage: image
  image: docker:latest
  services:
    - docker:dind
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-rc\d+)?$/'
      when: on_success
    - when: never
  needs:
    - job: validate:version
      artifacts: true
    - job: test:backend-app
      optional: true
    - job: test:client-app
      optional: true
  before_script:
    - echo "Docker Hub Username - ${DOCKERHUB_USERNAME}"
    - |
      if [ -z "$DOCKERHUB_USERNAME" ]; then
        echo "ERROR: DOCKERHUB_USERNAME is not set"
        exit 1
      fi
      if [ -z "$DOCKERHUB_TOKEN" ]; then
        echo "ERROR: DOCKERHUB_TOKEN is not set"
        exit 1
      fi
    - docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_TOKEN"
    - |
      if [ -z "$VERSION" ]; then
        VERSION=$(cat VERSION)
      fi
      echo "Building with VERSION=$VERSION"

image:api-gateway:
  extends: .backend-image-base
  script:
    - |
      IMAGE="$DOCKERHUB_USERNAME/disaster-response-api-gateway"
      docker build -t "$IMAGE:$VERSION" backend-app/api-gateway
      if [[ "$VERSION" != *"-rc"* ]]; then
        docker tag "$IMAGE:$VERSION" "$IMAGE:latest"
      fi
      docker push "$IMAGE:$VERSION"
      if [[ "$VERSION" != *"-rc"* ]]; then
        docker push "$IMAGE:latest"
      fi
      echo "IMAGE_API_GATEWAY=$IMAGE:$VERSION" >> image-refs.env
  artifacts:
    reports:
      dotenv: image-refs.env

