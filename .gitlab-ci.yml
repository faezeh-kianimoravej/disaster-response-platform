# DRCCS Multi-Service GitLab CI/CD Pipeline
# This is the main pipeline orchestrator that includes service-specific configurations

# Define global stages that all services can use
stages:
  - test
  - build
  - deploy
  - smoke

# Global variables that can be used across all services
variables:
  NODE_VERSION: "20"

# Include service-specific pipeline configurations
include:
  # Frontend Application
  - local: 'client-app/.gitlab-ci.yml'
  
  # Additional services will be added here as they are moved to their own directories
  # Example:
  # - local: 'backend/.gitlab-ci.yml'