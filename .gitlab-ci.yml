# DRCCS GitLab CI/CD Pipeline
stages:
  - test
  - build
  - deploy
  - smoke

variables:
  NODE_VERSION: "20"
  # Security scan exclusions
  SAST_EXCLUDED_PATHS: "**/node_modules,**/dist,**/build,**/.next,**/coverage,**/target"
  SECRET_DETECTION_EXCLUDED_PATHS: "**/node_modules,**/dist,**/build,**/.next,**/coverage,**/target"

include:
  - local: 'client-app/.gitlab-ci.yml'
  - local: 'backend-app/.gitlab-ci.yml'
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

semgrep-sast:
  image: returntocorp/semgrep:latest
  stage: test
  variables:
    SEMGREP_TIMEOUT: "900"
  script:
    - semgrep --config auto --exclude node_modules --exclude dist --exclude build --exclude coverage --exclude target --sarif -o semgrep.sarif . || true
    - |
      echo "\n=== Semgrep summary (from SARIF) ==="
      errors=$(grep -o '"level"[[:space:]]*:[[:space:]]*"error"' semgrep.sarif | wc -l || true)
      warnings=$(grep -o '"level"[[:space:]]*:[[:space:]]*"warning"' semgrep.sarif | wc -l || true)
      notes=$(grep -o '"level"[[:space:]]*:[[:space:]]*"note"' semgrep.sarif | wc -l || true)
      total=$((errors + warnings + notes))
      echo "Findings: total=$total error=$errors warning=$warnings note=$notes"
      echo "\nTop rules (by occurrences):"
      grep -o '"ruleId"[[:space:]]*:[[:space:]]*"[^"]*"' semgrep.sarif | \
        sed 's/"ruleId"[[:space:]]*:[[:space:]]*"//;s/"$//' | \
        sort | uniq -c | sort -nr | head -n 10 || true
  artifacts:
    when: always
    paths:
      - semgrep.sarif
    reports:
      sast: semgrep.sarif
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
      when: on_success