# ======================================
# Frontend Image Build
# ======================================
image:frontend:
  stage: image
  image: docker:latest
  services:
    - docker:dind
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-rc\d+)?$/'
      when: on_success
    - when: never
  needs:
    - job: validate:version
      artifacts: true
    - job: test:backend-app
      optional: true
    - job: test:client-app
      optional: true
  before_script:
    - echo "Docker Hub Username - ${DOCKERHUB_USERNAME}"
    - |
      if [ -z "$DOCKERHUB_USERNAME" ]; then
        echo "ERROR: DOCKERHUB_USERNAME is not set"
        exit 1
      fi
      if [ -z "$DOCKERHUB_TOKEN" ]; then
        echo "ERROR: DOCKERHUB_TOKEN is not set"
        exit 1
      fi
    - docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_TOKEN"
    - |
      if [ -z "$VERSION" ]; then
        VERSION=$(cat VERSION)
      fi
      echo "Building frontend with VERSION=$VERSION"
  script:
    - |
      IMAGE="$DOCKERHUB_USERNAME/disaster-response-frontend"
      docker build --build-arg VERSION=$VERSION -t "$IMAGE:$VERSION" client-app
      if [[ "$VERSION" != *"-rc"* ]]; then
        docker tag "$IMAGE:$VERSION" "$IMAGE:latest"
      fi
      docker push "$IMAGE:$VERSION"
      if [[ "$VERSION" != *"-rc"* ]]; then
        docker push "$IMAGE:latest"
      fi

# ======================================
# Security Scanning (Trivy)
# ======================================
.trivy-scan:
  stage: scan
  image: aquasec/trivy:latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-rc\d+)?$/'
      when: on_success
    - when: never
  allow_failure: true
  before_script:
    - |
      if [ -z "$VERSION" ]; then
        VERSION=$(cat VERSION)
      fi

scan:api-gateway:
  extends: .trivy-scan
  needs:
    - job: image:api-gateway
  script:
    - trivy image --severity HIGH,CRITICAL --ignore-unfixed "$DOCKERHUB_USERNAME/disaster-response-api-gateway:$VERSION"

scan:frontend:
  extends: .trivy-scan
  needs:
    - job: image:frontend
  script:
    - trivy image --severity HIGH,CRITICAL --ignore-unfixed "$DOCKERHUB_USERNAME/disaster-response-frontend:$VERSION"

# ======================================
# GitLab Release (strict - depends on all image jobs)
# ======================================
publish:gitlab-release:
  stage: publish
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-rc\d+)?$/'
      when: on_success
    - when: never
  needs:
    - validate:version
    - image:api-gateway
    - image:discovery-service
    - image:department-service
    - image:incident-service
    - image:municipality-service
    - image:notification-service
    - image:region-service
    - image:resource-service
    - image:user-service
    - image:frontend
  before_script:
    - |
      if [ -z "$VERSION" ]; then VERSION=$(cat VERSION); fi
      echo "Preparing GitLab Release for v$VERSION";
      # Generate release notes
      cat > release-notes.md << EOF
      DRCCS Release $CI_COMMIT_TAG

      This release was built automatically from tag $CI_COMMIT_TAG.

      Images (Docker Hub):
      - $DOCKERHUB_USERNAME/disaster-response-api-gateway:$VERSION
      - $DOCKERHUB_USERNAME/disaster-response-discovery-service:$VERSION
      - $DOCKERHUB_USERNAME/disaster-response-department-service:$VERSION
      - $DOCKERHUB_USERNAME/disaster-response-incident-service:$VERSION
      - $DOCKERHUB_USERNAME/disaster-response-municipality-service:$VERSION
      - $DOCKERHUB_USERNAME/disaster-response-notification-service:$VERSION
      - $DOCKERHUB_USERNAME/disaster-response-region-service:$VERSION
      - $DOCKERHUB_USERNAME/disaster-response-resource-service:$VERSION
      - $DOCKERHUB_USERNAME/disaster-response-user-service:$VERSION
      - $DOCKERHUB_USERNAME/disaster-response-frontend:$VERSION

      Note: 'latest' tag skipped for RC releases.

      Documentation:
      - Release process: RELEASING.md
      - Deployment guide: release/README.md
      EOF
  script:
    - release-cli create --name "DRCCS $CI_COMMIT_TAG" --tag-name "$CI_COMMIT_TAG" --description "$(cat release-notes.md)"
  allow_failure: false

# ======================================
# Security Scanning (SAST)
# ======================================
semgrep-sast:
  image: returntocorp/semgrep:latest
  stage: test
  variables:
    SEMGREP_TIMEOUT: "900"
  script:
    - semgrep --config auto --exclude node_modules --exclude dist --exclude build --exclude coverage --exclude target --sarif -o semgrep.sarif . || true
    - |
      echo "\n=== Semgrep summary (from SARIF) ==="
      errors=$(grep -o '"level"[[:space:]]*:[[:space:]]*"error"' semgrep.sarif | wc -l || true)
      warnings=$(grep -o '"level"[[:space:]]*:[[:space:]]*"warning"' semgrep.sarif | wc -l || true)
      notes=$(grep -o '"level"[[:space:]]*:[[:space:]]*"note"' semgrep.sarif | wc -l || true)
      total=$((errors + warnings + notes))
      echo "Findings: total=$total error=$errors warning=$warnings note=$notes"
      echo "\nTop rules (by occurrences):"
      grep -o '"ruleId"[[:space:]]*:[[:space:]]*"[^"]*"' semgrep.sarif | \
        sed 's/"ruleId"[[:space:]]*:[[:space:]]*"//;s/"$//' | \
        sort | uniq -c | sort -nr | head -n 10 || true
  artifacts:
    when: always
    paths:
      - semgrep.sarif
    reports:
      sast: semgrep.sarif
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
      when: on_success