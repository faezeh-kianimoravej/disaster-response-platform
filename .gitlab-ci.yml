# ======================================
# Security Scanning (Trivy)
# ======================================
.trivy-scan:
  stage: scan
  image: 
    name: aquasec/trivy:latest
    entrypoint: [""]
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-rc\d+)?$/'
      when: on_success
    - when: never
  allow_failure: true
  before_script:
    - |
      if [ -z "$VERSION" ]; then
        VERSION=$(cat VERSION)
      fi

scan:api-gateway:
  extends: .trivy-scan
  needs:
    - job: image:api-gateway
  script:
    - trivy image --severity HIGH,CRITICAL --ignore-unfixed "$DOCKERHUB_USERNAME/disaster-response-api-gateway:$VERSION"

