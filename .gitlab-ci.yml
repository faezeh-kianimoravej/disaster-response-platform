# ======================================
# GitLab Release (strict - depends on all image jobs)
# ======================================
publish:gitlab-release:
  stage: publish
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-rc\d+)?$/'
      when: on_success
    - when: never
  needs:
    - validate:version
    - image:api-gateway
    - image:discovery-service
    - image:department-service
    - image:incident-service
    - image:municipality-service
    - image:notification-service
    - image:region-service
    - image:resource-service
    - image:user-service
    - image:chat-service
    - image:deployment-service
    - image:frontend
  before_script:
    - |
      if [ -z "$VERSION" ]; then VERSION=$(cat VERSION); fi

      echo "Preparing GitLab Release for v$VERSION";
      RELEASE_DATE=$(date +"%B %d, %Y")
      IS_RC=""
      if [[ "$VERSION" == *"-rc"* ]]; then
        IS_RC="true"
      fi
      # Ensure full history/tags for changelog generation
      git fetch --prune --unshallow --tags || git fetch --prune --tags
      # Discover previous stable tag (excludes -rc)
      PREV_STABLE_TAG=$(git describe --tags --match "v[0-9]*.[0-9]*.[0-9]*" --abbrev=0 "${CI_COMMIT_TAG}^" 2>/dev/null || true)
      echo "Previous stable tag: ${PREV_STABLE_TAG:-<none>}"
      # Build commit changelog since previous stable (fallback to last 200 commits)
      if [ -n "$PREV_STABLE_TAG" ]; then
        git log --first-parent --pretty="* %s (%h)" "$PREV_STABLE_TAG..$CI_COMMIT_TAG" > changes.md
        git log --first-parent --merges --pretty="* %s (%h)" "$PREV_STABLE_TAG..$CI_COMMIT_TAG" > merges.md
      else
        git log --first-parent --pretty="* %s (%h)" -n 200 > changes.md
        git log --first-parent --merges --pretty="* %s (%h)" -n 200 > merges.md
      fi
      [ -s changes.md ] || echo "No commits found." > changes.md
      [ -s merges.md ] || echo "No merge commits found." > merges.md
      # Generate release notes
      cat > release-notes.md << EOF
      # DRCCS Release $CI_COMMIT_TAG

      **Disaster Response Command and Control System**

      This release was built automatically from tag \`$CI_COMMIT_TAG\`.

      ## 🚀 Quick Start

      ### Using Docker Compose (Recommended)

      \`\`\`bash
      # Pull the latest images
      docker-compose pull

      # Start all services
      docker-compose up -d

      # Verify services are running
      docker-compose ps
      \`\`\`

      ### Using Released Images

      All microservices are available as Docker images on Docker Hub. See the Images section below for the complete list.

      ## 📦 What's Included

      This release contains the following microservices:

      - **API Gateway** - Main entry point and request routing
      - **Discovery Service** - Service registry and discovery (Eureka)
      - **Department Service** - Emergency department management
      - **Incident Service** - Incident tracking and management
      - **Municipality Service** - Municipality administration
      - **Notification Service** - Event-driven notifications
      - **Region Service** - Regional management
      - **Resource Service** - Resource allocation and tracking
      - **User Service** - User authentication and management
      - **Deployment Service** - Deployment management
      - **Chat Service** - Real-time chat and messaging
      - **Frontend Application** - React-based web interface

      ## 🐳 Docker Images

      All images are tagged with version \`$VERSION\`:

      \`\`\`
      $DOCKERHUB_USERNAME/disaster-response-api-gateway:$VERSION
      $DOCKERHUB_USERNAME/disaster-response-discovery-service:$VERSION
      $DOCKERHUB_USERNAME/disaster-response-department-service:$VERSION
      $DOCKERHUB_USERNAME/disaster-response-incident-service:$VERSION
      $DOCKERHUB_USERNAME/disaster-response-municipality-service:$VERSION
      $DOCKERHUB_USERNAME/disaster-response-notification-service:$VERSION
      $DOCKERHUB_USERNAME/disaster-response-region-service:$VERSION
      $DOCKERHUB_USERNAME/disaster-response-resource-service:$VERSION
      $DOCKERHUB_USERNAME/disaster-response-user-service:$VERSION
      $DOCKERHUB_USERNAME/disaster-response-deployment-service:$VERSION
      $DOCKERHUB_USERNAME/disaster-response-chat-service:$VERSION
      $DOCKERHUB_USERNAME/disaster-response-frontend:$VERSION
      \`\`\`

      ## 📋 System Requirements

      - Docker Engine 20.10 or later
      - Docker Compose 2.0 or later
      - Minimum 4GB RAM recommended
      - PostgreSQL 15+ (included in docker-compose setup)

      ## 🔄 Upgrading from Previous Version

      \`\`\`bash
      # Stop existing services
      docker-compose down

      # Optional: Remove old volumes (⚠️ This will delete data)
      # docker-compose down -v

      # Pull new version
      docker-compose pull

      # Start services
      docker-compose up -d
      \`\`\`

      ## 📚 Documentation

      - **Release Process**: See [RELEASING.md](../RELEASING.md)
      - **Deployment Guide**: See [release/README.md](../release/README.md)
      - **Project Documentation**: Available in the [Docs/](../Docs/) directory

      ## 📝 Release Information

      - **Version**: $CI_COMMIT_TAG
      - **Release Date**: $RELEASE_DATE
      - **Build**: Automated CI/CD Pipeline
      - **Git Tag**: \`$CI_COMMIT_TAG\`
      - **Commit**: \`${CI_COMMIT_SHORT_SHA}\`
      - **Pipeline**: [#${CI_PIPELINE_ID}](${CI_PIPELINE_URL})

      ## ⚠️ Important Notes

      $(if [ "$IS_RC" = "true" ]; then echo "- This is a **Release Candidate (RC)** version intended for testing
      - Not recommended for production use"; fi)
      - The \`latest\` tag is $(if [ "$IS_RC" = "true" ]; then echo "not updated for RC releases"; else echo "updated with this release"; fi)
      - Please report any issues via the project's issue tracker

      ## 🆘 Support

      For issues, questions, or contributions, please refer to the project repository.

      ---

      **Full Changelog**: See commit history between tags for detailed changes
      EOF
      cat >> release-notes.md << 'EOF'

      ## Changes since previous stable
      EOF
      cat changes.md >> release-notes.md
      cat >> release-notes.md << 'EOF'

      ## Merges since previous stable
      EOF
      cat merges.md >> release-notes.md
  script:
    - release-cli create --name "DRCCS $CI_COMMIT_TAG" --tag-name "$CI_COMMIT_TAG" --description "$(cat release-notes.md)"
  allow_failure: false

# ======================================
# Security Scanning (SAST)
# ======================================
semgrep-sast:
  image: python:3.11-slim
  stage: test
  variables:
    SEMGREP_TIMEOUT: "900"
  script:
    - python3 -m pip install --upgrade pip setuptools wheel || true
    - python3 -m pip install semgrep || true
    - semgrep --config auto --exclude node_modules --exclude dist --exclude build --exclude coverage --exclude target --sarif -o semgrep.sarif . || true
    - |
      echo "\n=== Semgrep summary (from SARIF) ==="
      errors=$(grep -o '"level"[[:space:]]*:[[:space:]]*"error"' semgrep.sarif | wc -l || true)
      warnings=$(grep -o '"level"[[:space:]]*:[[:space:]]*"warning"' semgrep.sarif | wc -l || true)
      notes=$(grep -o '"level"[[:space:]]*:[[:space:]]*"note"' semgrep.sarif | wc -l || true)
      total=$((errors + warnings + notes))
      echo "Findings: total=$total error=$errors warning=$warnings note=$notes"
      echo "\nTop rules (by occurrences):"
      grep -o '"ruleId"[[:space:]]*:[[:space:]]*"[^"]*"' semgrep.sarif | \
        sed 's/"ruleId"[[:space:]]*:[[:space:]]*"//;s/"$//' | \
        sort | uniq -c | sort -nr | head -n 10 || true
    - |
      # Try converting SARIF -> GitLab SAST report so GitLab can parse findings
      if [ -f semgrep.sarif ]; then
        echo "Converting semgrep.sarif -> gl-sast-report.json"
        python3 tools/convert_sarif_to_gitlab_sast.py semgrep.sarif gl-sast-report.json || (
          echo "Conversion failed, gl-sast-report.json not created" >&2
        )
      else
        echo "No semgrep.sarif found; skipping conversion"
      fi
  artifacts:
    when: always
    paths:
      - semgrep.sarif
      - gl-sast-report.json
    reports:
      sast: gl-sast-report.json
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
      when: on_success

# ======================================
# Release badge
# ======================================
badges:release:
  stage: publish
  image: alpine:latest
  # Run only on stable tag releases (semantic version tags without -rc)
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      when: on_success
    - when: never
  script:
    - mkdir -p badges
    - VERSION_FILE=$(cat VERSION 2>/dev/null || echo "$CI_COMMIT_TAG")
    - echo "Writing badges/release.svg for VERSION=$VERSION_FILE"
    - |
      cat > badges/release.svg <<'SVG'
      <?xml version="1.0" encoding="UTF-8"?>
      <svg xmlns="http://www.w3.org/2000/svg" width="200" height="20">
        <rect rx="3" width="200" height="20" fill="#555"/>
        <rect rx="3" x="96" width="104" height="20" fill="#4c1"/>
        <g fill="#fff" font-family="DejaVu Sans,Verdana,Geneva,sans-serif" font-size="11">
          <text x="8" y="14">stable release</text>
          <text id="version" x="102" y="14">$VERSION_PLACEHOLDER</text>
        </g>
      </svg>
      SVG
    # Replace placeholder with actual version safely
    - sed -i "s/\$VERSION_PLACEHOLDER/${VERSION_FILE}/g" badges/release.svg || true
  artifacts:
    paths:
      - badges/release.svg
    expire_in: 30 days