# Client App CI/CD Pipeline Configuration
# Jobs run when client-app files change.
# Build and image jobs run only on version tags.

variables:
  NODE_VERSION: '20'

# Cache configuration for faster builds
.client-app-cache: &client-app-cache
  cache:
    key:
      files:
        - client-app/package-lock.json
    paths:
      - client-app/node_modules/

# Base job template for client-app jobs
.client-app-base:
  image: node:${NODE_VERSION}
  <<: *client-app-cache
  before_script:
    - cd client-app
    - npm ci

# Test job (full coverage on main & MRs to main)
test:frontend:
  extends: .client-app-base
  stage: test
  rules:
    # Always run on version tags
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-rc\d+)?$/'
      when: always
    # Run tests only when client-app files change (or manual/schedule)
    - changes:
        - client-app/**/*
      when: always
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: always
    - when: never
  script:
    - mkdir -p test-results
    - npm run lint
    - npm run build
    - mkdir -p test-results badges || true
    - npm run coverage | tee test-results/vitest-summary.json
    - |
      node - <<'NODE'
      const fs = require('fs');
      const p = 'test-results/vitest-summary.json';
      let raw = '';
      let total = 0;
      try { raw = fs.readFileSync(p,'utf8'); } catch(e) { raw = ''; }
      // If JUnit file exists, parse it to get exact test count (most reliable)
      try {
        if (fs.existsSync('test-results/junit.xml')) {
          const xml = fs.readFileSync('test-results/junit.xml','utf8');
          const matches = xml.match(/tests="(\d+)"/g) || [];
          if (matches.length > 0) {
            total = matches.map(m => parseInt(m.match(/(\d+)/)[0],10)).reduce((a,b)=>a+b,0);
          } else {
            const root = xml.match(/<testsuites[^>]*tests="(\d+)"/);
            if (root && root[1]) total = parseInt(root[1],10);
          }
        }
      } catch(e) {
        // ignore and fall back to stdout parsing
      }

      // Extract last JSON reporter object if present
      let jsonText = null;
      const lastBrace = raw.lastIndexOf('}');
      const firstBrace = raw.lastIndexOf('{', lastBrace);
      if (firstBrace !== -1 && lastBrace !== -1 && lastBrace > firstBrace) {
        jsonText = raw.slice(firstBrace, lastBrace + 1);
      } else {
        jsonText = raw;
      }
      let j = {};
      try { j = JSON.parse(jsonText); } catch(e) { j = {}; }
      if (typeof j.numTotalTests === 'number') total = j.numTotalTests;
      else if (typeof j.totalTests === 'number') total = j.totalTests;
      else if (j.stats && typeof j.stats.tests === 'number') total = j.stats.tests;
      else if (Array.isArray(j.tests)) total = j.tests.length;
      // If JSON reporter wasn't present, try textual patterns in the captured output
      if (!total) {
        // common patterns: 'X passed', 'Total: X tests', 'X tests', 'Tests: X'
        const passedMatch = raw.match(/(\d+)\s+passed/i);
        if (passedMatch && passedMatch[1]) {
          total = parseInt(passedMatch[1], 10);
        } else {
          const totalMatch = raw.match(/Total[:\s]+(\d+)\s+tests?/i) || raw.match(/Tests[:\s]+(\d+)/i);
          if (totalMatch && totalMatch[1]) total = parseInt(totalMatch[1], 10);
          else {
            // fallback: find a line like 'Test Files  10 passed' or '10 passed in'
            const other = raw.match(/(\d+)\s+passed[^\n]*/i) || raw.match(/(\d+)\s+tests?\b/i);
            if (other && other[1]) total = parseInt(other[1], 10);
          }
        }
      }
      const testsMsg = String(total);
      // Coverage: try to match lines like 'All files | ...  82.35%' in the raw output
      const covMatch = raw.match(/All files[^|]*\|[^|]*\s+([0-9]+(?:\.[0-9]+)?)/m);
      let covNum = 0;
      if (covMatch && covMatch[1]) covNum = Math.round(parseFloat(covMatch[1]));
      const covMsg = String(covNum);
      // Choose color: green >=90, yellow >=75, orange >=60, red otherwise
      const covColor = (covNum >= 90) ? '#4c1' : (covNum >= 75) ? '#dfb317' : (covNum >= 60) ? '#f39c12' : '#e05d44';
      // Create SVGs
      const testsSvg = `<?xml version="1.0"?>\n<svg xmlns='http://www.w3.org/2000/svg' width='110' height='20'>\n  <rect width='110' height='20' fill='#555'/>\n  <rect x='60' width='50' height='20' fill='#4c1'/>\n  <g fill='#fff' font-family='Verdana,Geneva,sans-serif' font-size='11'>\n    <text x='8' y='14'>tests</text>\n    <text x='72' y='14'>${testsMsg}</text>\n  </g>\n</svg>`;
      const covSvg = `<?xml version="1.0"?>\n<svg xmlns='http://www.w3.org/2000/svg' width='110' height='20'>\n  <rect width='110' height='20' fill='#555'/>\n  <rect x='60' width='50' height='20' fill='${covColor}'/>\n  <g fill='#fff' font-family='Verdana,Geneva,sans-serif' font-size='11'>\n    <text x='8' y='14'>coverage</text>\n    <text x='72' y='14'>${covMsg}%</text>\n  </g>\n</svg>`;
      try { fs.writeFileSync('badges/tests.svg', testsSvg, 'utf8'); console.log('Wrote badges/tests.svg ->', testsMsg); } catch(e) { console.error('Failed writing tests badge', e); }
      try { fs.writeFileSync('badges/coverage.svg', covSvg, 'utf8'); console.log('Wrote badges/coverage.svg ->', covMsg); } catch(e) { console.error('Failed writing coverage badge', e); }
      NODE
    - npm run format:check
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: client-app/coverage/cobertura-coverage.xml
      junit: client-app/test-results/junit.xml
    paths:
      - client-app/build/
      - client-app/coverage/cobertura-coverage.xml
      - client-app/test-results/junit.xml
      - client-app/badges/*.svg
    expire_in: 30 days
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
