# Client App CI/CD Pipeline Configuration
# This file contains the pipeline configuration specific to the React/Vite client application

variables:
  NODE_VERSION: '20'

# Cache configuration for faster builds
.client-app-cache: &client-app-cache
  cache:
    key:
      files:
        - client-app/package-lock.json
    paths:
      - client-app/node_modules/

# Base job template for client-app jobs
.client-app-base:
  image: node:${NODE_VERSION}
  <<: *client-app-cache
  before_script:
    - cd client-app
    - npm ci

# Test job (full coverage on main & MRs to main)
test:client-app:
  extends: .client-app-base
  stage: test
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - client-app/**/*
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
      changes:
        - client-app/**/*
  script:
    - npm run lint
    - npm run coverage
    - npm run format:check
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: client-app/coverage/cobertura-coverage.xml
    paths:
      - client-app/coverage/
    expire_in: 7 days
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'

# Feature branch lighter test job
test:client-app:feature-branches:
  extends: .client-app-base
  stage: test
  rules:
    - if: '$CI_COMMIT_BRANCH != "main" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME != "main"'
      changes:
        - client-app/**/*
  script:
    - npm run lint
    - npm run test:run
    - npm run format:check
  artifacts:
    when: on_failure
    paths:
      - client-app/coverage/
    expire_in: 1 day

# Build job providing artifact for deploy
build:client-app:
  extends: .client-app-base
  stage: build
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - client-app/**/*
  script:
    - npm run build
  artifacts:
    paths:
      - client-app/build/
    expire_in: 1 week

## Deploy job (Option 1: simple inline S3 sync using static credentials)
deploy:client-app:
  image: registry.gitlab.com/gitlab-org/cloud-deploy/aws-base:latest
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - client-app/**/*
  needs:
    - job: build:client-app
      artifacts: true
  script: |
    set -e
    echo "Deploying client build to s3://$S3_BUCKET"
    if [ -z "$S3_BUCKET" ]; then echo "ERROR: S3_BUCKET not set"; exit 1; fi
    aws --version || true
    aws s3 sync client-app/build/ "s3://$S3_BUCKET" --delete --acl public-read
    if [ -n "$CLOUDFRONT_DISTRIBUTION_ID" ]; then
      echo "Invalidating CloudFront distribution $CLOUDFRONT_DISTRIBUTION_ID"
      aws cloudfront create-invalidation --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" --paths "/*" || echo "WARN: CloudFront invalidation failed"
    fi
  environment:
    name: production
    url: "https://$S3_BUCKET.s3.amazonaws.com"

# Smoke test: verify the deployed site responds with HTTP 200
smoke:client-app:
  image: curlimages/curl:8.5.0
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - client-app/**/*
  needs:
    - job: deploy:client-app
      optional: false
  script:
    - echo "Running smoke test against https://d2m24xdy5zz2ti.cloudfront.net/"
    - |
      target_url="https://d2m24xdy5zz2ti.cloudfront.net/"
      attempts=0
      max_attempts=6
      sleep_base=5
      while true; do
        status=$(curl -s -o /dev/null -w "%{http_code}" "$target_url")
        echo "Attempt $((attempts+1))/$max_attempts -> $status"
        if [ "$status" -eq 200 ]; then
          echo "Smoke test passed"; break
        fi
        attempts=$((attempts+1))
        if [ $attempts -ge $max_attempts ]; then
          echo "Smoke test failed after $attempts attempts (last status $status)"; exit 1
        fi
        sleep_time=$((sleep_base * attempts))
        echo "Retrying in ${sleep_time}s..."; sleep $sleep_time
      done
  when: on_success
