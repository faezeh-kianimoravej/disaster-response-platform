<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Silent Check SSO</title>
  </head>
  <body>
    <script>
      try {
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(location.href, window.location.origin);
        }
      } catch (e) {
      }
    </script>
  </body>
</html>
