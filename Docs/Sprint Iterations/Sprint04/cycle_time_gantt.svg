<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520">
  <style>
    .bg { fill: #ffffff; }
    .plot-bg { fill: #fafafa; stroke: #eee; }
    .grid { stroke: #e6e6e6; stroke-width: 1; }
    .axis { stroke: #333; stroke-width: 1; }
    .label { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #333; }
    .title { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: bold; }
    .bar-fe { fill: #4dabf7; }
    .bar-be { fill: #69db7c; }
    .bar-other { fill: #ffd43b; }
    .row-shade { fill: #f7f7f7; }
  </style>

  <rect class="bg" x="0" y="0" width="960" height="520"/>

  <text x="480" y="28" text-anchor="middle" class="title">Sprint 4 — Cycle Time Gantt (2025-10-02 to 2025-10-12)</text>

  <!-- layout constants -->
  <!-- margins: left 160, right 40, top 60, bottom 60 -->
  <!-- plot width = 960 - 160 - 40 = 760; but we'll use 680 to align with other chart -->
  <!-- adjust: use 680, keep left margin 160, right margin 120 -->
  <g id="plot" transform="translate(160,60)">
    <rect class="plot-bg" x="0" y="0" width="680" height="360"/>

    <!-- rows: 12 items, rowH = 28 (barH 16, vpad 6 top/bottom) -->
    <!-- x scale: dates 2025-10-02..2025-10-12 inclusive => 11 days => 10 intervals; step = 680/10 = 68 -->
    <!-- vertical grid lines per day index 0..10 -->
    <g class="grid">
      <line x1="0" y1="0" x2="0" y2="360"/>
      <line x1="68" y1="0" x2="68" y2="360"/>
      <line x1="136" y1="0" x2="136" y2="360"/>
      <line x1="204" y1="0" x2="204" y2="360"/>
      <line x1="272" y1="0" x2="272" y2="360"/>
      <line x1="340" y1="0" x2="340" y2="360"/>
      <line x1="408" y1="0" x2="408" y2="360"/>
      <line x1="476" y1="0" x2="476" y2="360"/>
      <line x1="544" y1="0" x2="544" y2="360"/>
      <line x1="612" y1="0" x2="612" y2="360"/>
      <line x1="680" y1="0" x2="680" y2="360"/>
    </g>

    <!-- alternating row shading -->
    <g opacity="0.4">
      <rect class="row-shade" x="0" y="0" width="680" height="28"/>
      <rect class="row-shade" x="0" y="56" width="680" height="28"/>
      <rect class="row-shade" x="0" y="112" width="680" height="28"/>
      <rect class="row-shade" x="0" y="168" width="680" height="28"/>
      <rect class="row-shade" x="0" y="224" width="680" height="28"/>
      <rect class="row-shade" x="0" y="280" width="680" height="28"/>
    </g>

    <!-- x-axis labels (dates) at bottom -->
    <g class="label" transform="translate(0,360)">
      <text x="0" y="20" text-anchor="middle">Oct 2</text>
      <text x="68" y="20" text-anchor="middle">Oct 3</text>
      <text x="136" y="20" text-anchor="middle">Oct 4</text>
      <text x="204" y="20" text-anchor="middle">Oct 5</text>
      <text x="272" y="20" text-anchor="middle">Oct 6</text>
      <text x="340" y="20" text-anchor="middle">Oct 7</text>
      <text x="408" y="20" text-anchor="middle">Oct 8</text>
      <text x="476" y="20" text-anchor="middle">Oct 9</text>
      <text x="544" y="20" text-anchor="middle">Oct 10</text>
      <text x="612" y="20" text-anchor="middle">Oct 11</text>
      <text x="680" y="20" text-anchor="middle">Oct 12</text>
    </g>

    <!-- left labels -->
    <g class="label" text-anchor="end" transform="translate(-10,14)">
      <text x="0" y="0">Wireframes</text>
      <text x="0" y="28">Backend services</text>
      <text x="0" y="56">FE - Application setup</text>
      <text x="0" y="84">FE - Pipeline</text>
      <text x="0" y="112">FE - Resource overview page</text>
      <text x="0" y="140">FE - Resource create/view/edit page</text>
      <text x="0" y="168">FE - Departments overview</text>
      <text x="0" y="196">FE - Municipalities overview</text>
      <text x="0" y="224">BE - Resource API CRUD</text>
      <text x="0" y="252">BE - Resource API Details</text>
      <text x="0" y="280">BE - Departments API</text>
      <text x="0" y="308">BE - Municipalities API</text>
    </g>

    <!-- bars: x = startIndex*68 + 3; width = (endIndex - startIndex + 1)*68 - 6; y = rowIndex*28 + 6; h=16 -->
    <g>
      <!-- 0: Wireframes 0..4 -->
      <rect class="bar-other" x="3" y="6" width="334" height="16" rx="3"/>
      <!-- 1: Backend services 1..4 -->
      <rect class="bar-other" x="71" y="34" width="266" height="16" rx="3"/>
      <!-- 2: FE - Application setup 5..5 -->
      <rect class="bar-fe" x="343" y="62" width="62" height="16" rx="3"/>
      <!-- 3: FE - Pipeline 5..7 -->
      <rect class="bar-fe" x="343" y="90" width="198" height="16" rx="3"/>
      <!-- 4: FE - Resource overview 5..8 -->
      <rect class="bar-fe" x="343" y="118" width="266" height="16" rx="3"/>
      <!-- 5: FE - Resource create/view/edit 6..8 -->
      <rect class="bar-fe" x="411" y="146" width="198" height="16" rx="3"/>
      <!-- 6: FE - Departments overview 8..8 -->
      <rect class="bar-fe" x="547" y="174" width="62" height="16" rx="3"/>
      <!-- 7: FE - Municipalities overview 9..9 -->
      <rect class="bar-fe" x="615" y="202" width="62" height="16" rx="3"/>
      <!-- 8: BE - Resource API CRUD 7..9 -->
      <rect class="bar-be" x="479" y="230" width="198" height="16" rx="3"/>
      <!-- 9: BE - Resource API Details 7..9 -->
      <rect class="bar-be" x="479" y="258" width="198" height="16" rx="3"/>
      <!-- 10: BE - Departments API 8..8 -->
      <rect class="bar-be" x="547" y="286" width="62" height="16" rx="3"/>
      <!-- 11: BE - Municipalities API 8..10 -->
      <rect class="bar-be" x="547" y="314" width="198" height="16" rx="3"/>
    </g>

    <!-- bottom axis line -->
    <line class="axis" x1="0" y1="360" x2="680" y2="360"/>
  </g>

  <!-- legend -->
  <g class="label" transform="translate(160,460)">
    <rect x="0" y="-12" width="12" height="12" class="bar-fe"/>
    <text x="18" y="-2">FE tasks</text>
    <rect x="90" y="-12" width="12" height="12" class="bar-be"/>
    <text x="108" y="-2">BE tasks</text>
    <rect x="180" y="-12" width="12" height="12" class="bar-other"/>
    <text x="198" y="-2">Analysis/other</text>
  </g>

  <text x="160" y="490" class="label">Bars span Start→Done dates inclusive; vertical alignment shows concurrent work.</text>
</svg>
