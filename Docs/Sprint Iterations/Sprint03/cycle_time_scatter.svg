<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <style>
    .bg { fill: #ffffff; }
    .axis { stroke: #333; stroke-width: 1; }
    .grid { stroke: #ddd; stroke-width: 1; }
    .point { fill: #2b79c2; stroke: #0b3b70; stroke-width: 1; }
    .label { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #222; }
    .title { font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: bold; }
    .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #444; }
  </style>

  <rect class="bg" x="0" y="0" width="800" height="400" />

  <!-- Title -->
  <text x="20" y="30" class="title">Sprint 3 — Cycle time scatter plot</text>
  <text x="20" y="50" class="subtitle">Each point = one completed item (calendar days, inclusive)</text>

  <!-- Axes -->
  <g transform="translate(80,320)">
    <!-- x axis: item index  -->
    <line x1="0" y1="0" x2="640" y2="0" class="axis" />
    <!-- y axis: days -->
    <line x1="0" y1="0" x2="0" y2="-240" class="axis" />

    <!-- horizontal grid lines and labels (days 0..6) -->
    <!-- We'll show 0..6 days -->
    <g>
      <line class="grid" x1="0" y1="0" x2="640" y2="0" />
      <text x="-40" y="5" class="label">0</text>
    </g>
    <g transform="translate(0,-40)">
      <line class="grid" x1="0" y1="0" x2="640" y2="0" />
      <text x="-40" y="5" class="label">1</text>
    </g>
    <g transform="translate(0,-80)">
      <line class="grid" x1="0" y1="0" x2="640" y2="0" />
      <text x="-40" y="5" class="label">2</text>
    </g>
    <g transform="translate(0,-120)">
      <line class="grid" x1="0" y1="0" x2="640" y2="0" />
      <text x="-40" y="5" class="label">3</text>
    </g>
    <g transform="translate(0,-160)">
      <line class="grid" x1="0" y1="0" x2="640" y2="0" />
      <text x="-40" y="5" class="label">4</text>
    </g>
    <g transform="translate(0,-200)">
      <line class="grid" x1="0" y1="0" x2="640" y2="0" />
      <text x="-40" y="5" class="label">5</text>
    </g>
    <g transform="translate(0,-240)">
      <line class="grid" x1="0" y1="0" x2="640" y2="0" />
      <text x="-40" y="5" class="label">6</text>
    </g>

    <!-- x labels (abbreviated item names) -->
    <g transform="translate(0,10)" class="label">
      <text x="0" y="15">Refine</text>
      <text x="100" y="15">Impact</text>
      <text x="200" y="15">ADD4</text>
      <text x="300" y="15">DefReady</text>
      <text x="400" y="15">Quality</text>
      <text x="500" y="15">Domain</text>
    </g>

    <!-- Data points: using the cycle times [5,1,4,1,1,1] -->
    <!-- scale: y = days * 40  (1 day = 40px), x positions spaced by 100px starting at 20 -->
    <g>
      <!-- Refine (5 days) -->
      <circle class="point" cx="20" cy="-200" r="8" />
      <text class="label" x="20" y="-212" text-anchor="middle">5d</text>

      <!-- Impact (1 day) -->
      <circle class="point" cx="120" cy="-40" r="8" />
      <text class="label" x="120" y="-52" text-anchor="middle">1d</text>

      <!-- ADD4 (4 days) -->
      <circle class="point" cx="220" cy="-160" r="8" />
      <text class="label" x="220" y="-172" text-anchor="middle">4d</text>

      <!-- DefReady (1 day) -->
      <circle class="point" cx="320" cy="-40" r="8" />
      <text class="label" x="320" y="-52" text-anchor="middle">1d</text>

      <!-- Quality (1 day) -->
      <circle class="point" cx="420" cy="-40" r="8" />
      <text class="label" x="420" y="-52" text-anchor="middle">1d</text>

      <!-- Domain (1 day) -->
      <circle class="point" cx="520" cy="-40" r="8" />
      <text class="label" x="520" y="-52" text-anchor="middle">1d</text>
    </g>
  </g>

  <!-- Footer / legend -->
  <g transform="translate(80,350)" class="label">
    <rect x="0" y="-18" width="12" height="12" fill="#2b79c2" stroke="#0b3b70" />
    <text x="20" y="-8">Cycle time (days)</text>
  </g>

</svg>