<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <style>
    .bg { fill: #fff; }
    .axis { stroke: #333; stroke-width: 1; }
    .grid { stroke: #ddd; stroke-width: 1; }
    .point { fill: #1f77b4; stroke: #0b62a4; }
    .label { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #333; }
    .title { font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: bold; }
  </style>

  <rect class="bg" x="0" y="0" width="800" height="400" />

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" class="title">Cycle Time Scatter Plot — Sprint 4</text>

  <!-- Plot area -->
  <g transform="translate(60,60)">
    <!-- axes background -->
    <rect x="0" y="0" width="680" height="300" fill="#fafafa" stroke="#eee" />

    <!-- grid lines and y labels (0..6) -->
    <!-- We choose max y = 6 for padding above max cycle time 5 -->
    <!-- y scale: 0 -> 300, 6 -> 0 (invert) -->
    <!-- draw horizontal grid lines -->
    <g class="grid">
      <line x1="0" y1="300" x2="680" y2="300" />
      <line x1="0" y1="250" x2="680" y2="250" />
      <line x1="0" y1="200" x2="680" y2="200" />
      <line x1="0" y1="150" x2="680" y2="150" />
      <line x1="0" y1="100" x2="680" y2="100" />
      <line x1="0" y1="50" x2="680" y2="50" />
      <line x1="0" y1="0" x2="680" y2="0" />
    </g>

    <!-- y-axis labels (0..6) -->
    <g class="label">
      <text x="-12" y="305" text-anchor="end">0</text>
      <text x="-12" y="255" text-anchor="end">1</text>
      <text x="-12" y="205" text-anchor="end">2</text>
      <text x="-12" y="155" text-anchor="end">3</text>
      <text x="-12" y="105" text-anchor="end">4</text>
      <text x="-12" y="55" text-anchor="end">5</text>
      <text x="-12" y="5" text-anchor="end">6</text>
    </g>

    <!-- x-axis labels (1..12) and vertical grid lines -->
    <g transform="translate(0,300)">
      <!-- vertical grid and labels -->
      <!-- x spacing: 680 / 11 = 61.8181818182 -->
      <!-- draw vertical grid lines and labels -->
      <g class="grid">
        <line x1="0" y1="0" x2="0" y2="-300" />
        <line x1="61.818" y1="0" x2="61.818" y2="-300" />
        <line x1="123.636" y1="0" x2="123.636" y2="-300" />
        <line x1="185.455" y1="0" x2="185.455" y2="-300" />
        <line x1="247.273" y1="0" x2="247.273" y2="-300" />
        <line x1="309.091" y1="0" x2="309.091" y2="-300" />
        <line x1="370.909" y1="0" x2="370.909" y2="-300" />
        <line x1="432.727" y1="0" x2="432.727" y2="-300" />
        <line x1="494.545" y1="0" x2="494.545" y2="-300" />
        <line x1="556.364" y1="0" x2="556.364" y2="-300" />
        <line x1="618.182" y1="0" x2="618.182" y2="-300" />
        <line x1="680" y1="0" x2="680" y2="-300" />
      </g>
      <g class="label">
        <text x="0" y="18" text-anchor="middle">1</text>
        <text x="61.818" y="18" text-anchor="middle">2</text>
        <text x="123.636" y="18" text-anchor="middle">3</text>
        <text x="185.455" y="18" text-anchor="middle">4</text>
        <text x="247.273" y="18" text-anchor="middle">5</text>
        <text x="309.091" y="18" text-anchor="middle">6</text>
        <text x="370.909" y="18" text-anchor="middle">7</text>
        <text x="432.727" y="18" text-anchor="middle">8</text>
        <text x="494.545" y="18" text-anchor="middle">9</text>
        <text x="556.364" y="18" text-anchor="middle">10</text>
        <text x="618.182" y="18" text-anchor="middle">11</text>
        <text x="680" y="18" text-anchor="middle">12</text>
      </g>
    </g>

    <!-- Data points -->
    <g>
      <!-- cycle times array -->
      <!-- values: [5,4,1,3,4,3,1,1,3,3,1,3] -->
      <!-- compute coords: x = (index-1) * 61.818, y = 300 - (value/6)*300 -->
      <!-- Points -->
      <circle class="point" cx="0" cy="50" r="6" />
      <circle class="point" cx="61.818" cy="100" r="6" />
      <circle class="point" cx="123.636" cy="250" r="6" />
      <circle class="point" cx="185.455" cy="200" r="6" />
      <circle class="point" cx="247.273" cy="100" r="6" />
      <circle class="point" cx="309.091" cy="200" r="6" />
      <circle class="point" cx="370.909" cy="250" r="6" />
      <circle class="point" cx="432.727" cy="250" r="6" />
      <circle class="point" cx="494.545" cy="200" r="6" />
      <circle class="point" cx="556.364" cy="200" r="6" />
      <circle class="point" cx="618.182" cy="250" r="6" />
      <circle class="point" cx="680" cy="200" r="6" />

      <!-- labels near points -->
      <text class="label" x="0" y="40" text-anchor="middle">5</text>
      <text class="label" x="61.818" y="90" text-anchor="middle">4</text>
      <text class="label" x="123.636" y="240" text-anchor="middle">1</text>
      <text class="label" x="185.455" y="190" text-anchor="middle">3</text>
      <text class="label" x="247.273" y="90" text-anchor="middle">4</text>
      <text class="label" x="309.091" y="190" text-anchor="middle">3</text>
      <text class="label" x="370.909" y="240" text-anchor="middle">1</text>
      <text class="label" x="432.727" y="240" text-anchor="middle">1</text>
      <text class="label" x="494.545" y="190" text-anchor="middle">3</text>
      <text class="label" x="556.364" y="190" text-anchor="middle">3</text>
      <text class="label" x="618.182" y="240" text-anchor="middle">1</text>
      <text class="label" x="680" y="190" text-anchor="middle">3</text>
    </g>
  </g>

  <!-- Legend & footnote -->
  <text x="60" y="380" class="label">x = item index (1..12), y = cycle time (days). Median = 3, Mean = 2.67</text>
</svg>
