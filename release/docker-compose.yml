services:
  postgres-db:
    image: postgres:16
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backend-app/init-scripts:/docker-entrypoint-initdb.d
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - app-network
    restart: always

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - app-network
    restart: always

  discovery-service:
    image: fkiani/disaster-response-discovery-service:latest
    container_name: discovery-service
    ports:
      - "8761:8761"
    networks:
      - app-network
    depends_on:
      postgres-db:
        condition: service_healthy
    restart: always

  api-gateway:
    image: fkiani/disaster-response-api-gateway:latest
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_PROFILES_ACTIVE=local-docker
    depends_on:
      discovery-service:
        condition: service_started
    networks:
      - app-network
    restart: always

  user-service:
    image: fkiani/disaster-response-user-service:latest
    container_name: user-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/user_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_PROFILES_ACTIVE=local-docker
    depends_on:
      - discovery-service
      - postgres-db
    networks:
      - app-network
    restart: always

  incident-service:
    image: fkiani/disaster-response-incident-service:latest
    container_name: incident-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/incident_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_PROFILES_ACTIVE=local-docker
    depends_on:
      - discovery-service
      - postgres-db
    networks:
      - app-network
    restart: always

  deployment-service:
    image: fkiani/disaster-response-deployment-service:latest
    container_name: deployment-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/deployment_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_PROFILES_ACTIVE=local-docker
    depends_on:
      - discovery-service
      - postgres-db
    networks:
      - app-network
    restart: always

  resource-service:
    image: fkiani/disaster-response-resource-service:latest
    container_name: resource-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/resource_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_PROFILES_ACTIVE=local-docker
    depends_on:
      - discovery-service
      - postgres-db
    networks:
      - app-network
    restart: always

  department-service:
    image: fkiani/disaster-response-department-service:latest
    container_name: department-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/department_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_PROFILES_ACTIVE=local-docker
    depends_on:
      - discovery-service
      - postgres-db
    networks:
      - app-network
    restart: always

  municipality-service:
    image: fkiani/disaster-response-municipality-service:latest
    container_name: municipality-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/municipality_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_PROFILES_ACTIVE=local-docker
    depends_on:
      - discovery-service
      - postgres-db
    networks:
      - app-network
    restart: always

  region-service:
    image: fkiani/disaster-response-region-service:latest
    container_name: region-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/region_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_PROFILES_ACTIVE=local-docker
    depends_on:
      - discovery-service
      - postgres-db
    networks:
      - app-network
    restart: always

  notification-service:
    image: fkiani/disaster-response-notification-service:latest
    container_name: notification-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/notification_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_PROFILES_ACTIVE=local-docker
    depends_on:
      - discovery-service
      - postgres-db
      - kafka
    networks:
      - app-network
    restart: always

  frontend:
    image: fkiani/disaster-response-frontend:latest
    container_name: disaster-frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - app-network
    restart: always

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
