services:
  # ---------- Backend stack (reuse existing Dockerfiles) ----------
  postgres-db:
    image: postgres:16
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backend-app/init-scripts:/docker-entrypoint-initdb.d
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - app-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - app-network
    restart: on-failure

  discovery-service:
    build: ../backend-app/discovery-service
    container_name: discovery-service
    ports:
      - "8761:8761"
    networks:
      - app-network
    depends_on:
      postgres-db:
        condition: service_healthy
    restart: on-failure

  api-gateway:
    build: ../backend-app/api-gateway
    container_name: api-gateway
    depends_on:
      discovery-service:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${STACK_PROFILE:-local-docker}
    networks:
      - app-network
    restart: on-failure

  resource-service:
    build: ../backend-app/resource-service
    container_name: resource-service
    depends_on:
      postgres-db:
        condition: service_healthy
      discovery-service:
        condition: service_started
    ports:
      - "8087:8087"
    environment:
      SPRING_PROFILES_ACTIVE: ${STACK_PROFILE:-local-docker}
    networks:
      - app-network
    restart: on-failure

  department-service:
    build: ../backend-app/department-service
    container_name: department-service
    depends_on:
      postgres-db:
        condition: service_healthy
      discovery-service:
        condition: service_started
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: ${STACK_PROFILE:-local-docker}
    networks:
      - app-network
    restart: on-failure

  municipality-service:
    build: ../backend-app/municipality-service
    container_name: municipality-service
    depends_on:
      postgres-db:
        condition: service_healthy
      discovery-service:
        condition: service_started
      department-service:
        condition: service_started
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: ${STACK_PROFILE:-local-docker}
    networks:
      - app-network
    restart: on-failure

  region-service:
    build: ../backend-app/region-service
    container_name: region-service
    depends_on:
      postgres-db:
        condition: service_healthy
      discovery-service:
        condition: service_started
      municipality-service:
        condition: service_started
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: ${STACK_PROFILE:-local-docker}
    networks:
      - app-network
    restart: on-failure

  incident-service:
    build: ../backend-app/incident-service
    container_name: incident-service
    depends_on:
      postgres-db:
        condition: service_healthy
      discovery-service:
        condition: service_started
      kafka:
        condition: service_started
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: ${STACK_PROFILE:-local-docker}
    networks:
      - app-network
    restart: on-failure

  notification-service:
    build: ../backend-app/notification-service
    container_name: notification-service
    depends_on:
      postgres-db:
        condition: service_healthy
      discovery-service:
        condition: service_started
      kafka:
        condition: service_started
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: ${STACK_PROFILE:-local-docker}
    networks:
      - app-network
    restart: on-failure

  user-service:
    build: ../backend-app/user-service
    container_name: user-service
    depends_on:
      postgres-db:
        condition: service_healthy
      discovery-service:
        condition: service_started
      kafka:
        condition: service_started
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: ${STACK_PROFILE:-local-docker}
    networks:
      - app-network
    restart: on-failure

  # ---------- Frontend ----------
  client-app:
    build: ../client-app
    container_name: client-app
    depends_on:
      api-gateway:
        condition: service_started
    ports:
      - "3000:80"
    networks:
      - app-network
    restart: on-failure

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
